<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CryptoPro Charts</title>
  <link rel="icon" type="image/svg+xml" href="/favicon.svg">
  <link rel="stylesheet" href="/css/style.css">
  <script src="https://unpkg.com/lightweight-charts@4.1.3/dist/lightweight-charts.standalone.production.js"></script>
</head>
<body>
  <!-- TOP BAR -->
  <header class="topbar">
    <div class="tb-group">
      <span class="logo">📈 <b>CryptoPro</b> Charts</span>
      <button id="indDropBtn" class="tb-btn" title="Add indicators to the active chart">Indicators ▾</button>
      <button id="toggleRight" class="tb-btn" title="Toggle watchlist">☰</button>
    </div>

    <div class="tb-group">
      <div id="layoutDropWrap" class="layout-drop-wrap">
        <button id="layoutDropBtn" class="tb-btn layout-drop-btn">Single ▾</button>
        <div id="layoutDropMenu" class="layout-drop-menu" style="display:none"></div>
      </div>
    </div>

    <div class="tb-group right">
      <button id="evtMarkersBtn" class="tb-btn evt-markers-btn active" title="Toggle event markers on charts">📅</button>
      <button id="templatesBtn" class="tb-btn">Templates</button>
      <button id="saveBtn" class="tb-btn">Save</button>
      <button id="layoutsBtn" class="tb-btn">Layouts</button>
      <span class="ws-conn" title="Connected exchange / live feed">
        <span id="wsExchange" class="ws-exchange"></span>
        <span id="wsStatus" class="ws-status" title="WebSocket"></span>
      </span>
      <button id="alertsBtn" class="tb-btn alerts">🔔<span id="alertBadge" class="badge" style="display:none">0</span></button>
      <button id="settingsBtn" class="tb-btn">⚙</button>
      <button id="themeToggle" class="tb-btn" title="Toggle theme">◐</button>
    </div>
  </header>

  <div class="app-main">
    <!-- LEFT: active indicators on current chart -->
    <aside id="leftPanel" class="left-panel">
      <div class="panel-head">Active on chart</div>
      <div id="indChips" class="ind-chips"></div>
    </aside>

    <!-- Floating indicator picker dropdown (shown by #indDropBtn) -->
    <div id="indDropdown" class="ind-dropdown" style="display:none">
      <input id="indFilter" class="ind-drop-search" placeholder="Search indicators…">
      <div id="indList" class="ind-drop-list"></div>
    </div>

    <!-- Drawing toolbar -->
    <div id="drawToolbar" class="draw-toolbar"></div>

    <!-- CENTER: charts -->
    <main id="chartsArea" class="charts-area layout-l1"></main>

    <!-- Splitter -->
    <div id="splitterRight" class="panel-splitter"></div>

    <!-- RIGHT: watchlist / orderbook / techinfo / scanner -->
    <aside id="rightPanel" class="right-panel">
      <div class="right-tabs">
        <button class="right-tab active" data-tab="watchlist">Watchlist</button>
        <button class="right-tab" data-tab="events">Events</button>
        <button class="right-tab" data-tab="orderbook">Book</button>
        <button class="right-tab" data-tab="techinfo">Info</button>
        <button class="right-tab" data-tab="scanner">Scanner</button>
      </div>

      <div class="right-tab-content active" data-tab="watchlist">
        <div class="sym-search-wrap">
          <input id="symSearch" class="panel-search" placeholder="Search all symbols…">
          <div id="symSearchResults" class="sym-search-results"></div>
        </div>
        <div id="wlTabs" class="wl-tabs"></div>
        <div id="symListHead" class="sym-list-head">
          <span class="col-spacer"></span>
          <span class="col-spacer"></span>
          <span class="col" data-col="name">Symbol</span>
          <span class="col num" data-col="price">Price</span>
          <span class="col num" data-col="chg">Chg</span>
          <span class="col num" data-col="chgpct">%</span>
        </div>
        <div id="symList" class="sym-list"></div>
        <div class="wl-footer">
          <button id="newWatchlistBtn">+ Watchlist</button>
          <button id="addSymbolBtn">+ Symbol</button>
        </div>
      </div>

      <div class="right-tab-content" data-tab="events">
        <div class="events-head">
          <span>Market Events</span>
          <label class="events-filter"><input type="checkbox" id="evtHighOnly"> High impact only</label>
        </div>
        <div id="eventsList" class="events-list"><div class="muted">Loading events…</div></div>
      </div>

      <div class="right-tab-content" data-tab="orderbook">
        <div id="obContent" class="ob-content"><div class="muted">Select the Book tab to load.</div></div>
      </div>

      <div class="right-tab-content" data-tab="techinfo">
        <div id="techContent" class="tech-content"></div>
      </div>

      <div class="right-tab-content" data-tab="scanner">
        <div class="scan-controls">
          <select id="scanType"></select>
          <select id="scanScope">
            <option value="watchlist">Watchlist</option>
            <option value="all">All pairs (100)</option>
          </select>
          <button id="scanRun" class="primary-btn">Scan</button>
        </div>
        <div id="scanResults" class="scan-results"></div>
      </div>
    </aside>
  </div>

  <!-- Alerts slide-out -->
  <div id="alertsPanel" class="alerts-overlay">
    <div class="alerts-head">
      <span>Alerts</span>
      <div>
        <button id="addAlertBtn" class="primary-btn">+ Add</button>
        <button id="closeAlertsBtn" class="tb-btn">✕</button>
      </div>
    </div>
    <div id="alertsList" class="alerts-list"></div>
  </div>

  <script type="module" src="/js/main.js"></script>
</body>
</html>
