  }
  if (tabId === 'techinfo' && state.activePanel) {
    updateTechInfo(state.activePanel.symbol, state.activePanel.symbolName);
  }
}

// ============================================================
// DRAWINGS EXPORT / IMPORT
// ============================================================
function exportDrawings(panel) {
  if (!panel || !panel.drawings.length) { toast('No drawings to export'); return; }
  const data = { symbol: panel.symbol, timeframe: panel.timeframe, drawings: panel.drawings };
  const blob = new Blob([JSON.stringify(data, null, 2)], { type:'application/json' });
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = `drawings_${panel.symbol}_${panel.timeframe}_${Date.now()}.json`;
  a.click();
  URL.revokeObjectURL(a.href);
  toast(`Exported ${panel.drawings.length} drawings`);
}

function importDrawings(panel, file) {
  const reader = new FileReader();
  reader.onload = e => {
    try {
      const data = JSON.parse(e.target.result);
      if (!Array.isArray(data.drawings)) throw new Error('Invalid format');
      panel.drawings = [...(panel.drawings||[]), ...data.drawings];
      renderDrawings(panel);
      autoSave();
      toast(`Imported ${data.drawings.length} drawings`);
    } catch(err) { toast('Import failed: invalid file'); }
  };
  reader.readAsText(file);
}

// ============================================================
// SAVE / LOAD  (localStorage persistence)
// ============================================================

function getStateSnapshot() {
  return {
    version: 2,
    theme: state.theme,
    layout: state.layout,
    watchlists: JSON.parse(JSON.stringify(state.watchlists)),
    currentWatchlist: state.currentWatchlist,
    wlSort: { ...state.wlSort },
    settings: { ...state.settings },
    alerts: state.alerts.map(a=>({...a})),
    panels: state.panels.map(p => ({
      symbol: p.symbol,
      symbolName: p.symbolName,
      timeframe: p.timeframe,
      indicators: p.indicators.map(ind => ({
        defId: ind.defId,
        params: { ...ind.params },
        color: ind.color,
      })),
      drawings: (p.drawings || []).map(d => ({ ...d })),
    })),
  };
}

let _saveTimer = null;
function autoSave() {
  clearTimeout(_saveTimer);
  _saveTimer = setTimeout(() => {
    try {
      localStorage.setItem('cryptopro_autosave', JSON.stringify(getStateSnapshot()));
    } catch(e) { console.warn('[CryptoPro] autoSave failed:', e); }
  }, 1500);
}

function getSavedLayouts() {
  try { return JSON.parse(localStorage.getItem('cryptopro_layouts') || '[]'); } catch(e) { return []; }
}

function saveNamedLayout(name) {
  if (!name) return;
  const layouts = getSavedLayouts();
  const idx = layouts.findIndex(l => l.name === name);
  const entry = { name, savedAt: new Date().toLocaleString(), ...getStateSnapshot() };
  if (idx >= 0) layouts[idx] = entry; else layouts.push(entry);
  while (layouts.length > 10) layouts.shift();
  try {
    localStorage.setItem('cryptopro_layouts', JSON.stringify(layouts));
    toast(`Layout "${name}" saved`);
  } catch(e) { toast('Save failed — storage may be full'); }
}

function deleteNamedLayout(name) {
  const layouts = getSavedLayouts().filter(l => l.name !== name);
  localStorage.setItem('cryptopro_layouts', JSON.stringify(layouts));
}

function restorePanels(panelsData) {
  const area = document.getElementById('chartsArea');
  for (const pd of panelsData) {
    const panel = createPanel(pd.symbol || 'BTCUSDT', pd.symbolName || '', pd.timeframe || '1h');
    const el = buildPanelDOM(panel);
    area.appendChild(el);
    try { initChart(panel); } catch(e) { console.error('[CryptoPro] initChart:', e); }
    loadPanelData(panel).then(() => {
      (pd.indicators || []).forEach(ind => addIndicator(panel, ind.defId, ind.params || {}));
      if (pd.drawings && pd.drawings.length > 0) {
        panel.drawings = pd.drawings.map(d => ({ ...d }));
        renderDrawings(panel);
      }
    }).catch(e => console.error('[CryptoPro] restore panel data:', e));
  }
  if (state.panels.length > 0) setActivePanel(state.panels[0]);
}

async function applyLayoutData(data) {
  if (data.theme) setTheme(data.theme);
  if (data.settings) { state.settings = { ...state.settings, ...data.settings }; }
  if (data.alerts) { state.alerts = data.alerts; renderAlertsList(); updateAlertsBadge(); }
  if (data.watchlists) {
    state.watchlists = JSON.parse(JSON.stringify(data.watchlists));
    state.currentWatchlist = data.currentWatchlist || Object.keys(data.watchlists)[0];
    if (data.wlSort) state.wlSort = data.wlSort;
    renderWatchlistTabs();
    renderSymbolList();
    startPriceWS();
  }
  [...state.panels].forEach(p => destroyPanel(p));
  const area = document.getElementById('chartsArea');
  area.innerHTML = '';
  const layout = data.layout || 'l1';
  state.layout = layout;
  area.className = `charts-area ${layout}`;
  document.querySelectorAll('#layoutBtns .btn').forEach(btn =>
    btn.classList.toggle('active', btn.dataset.layout === layout)
  );
  const panelsData = (data.panels && data.panels.length > 0)
    ? data.panels
    : [{ symbol:'BTCUSDT', symbolName:'Bitcoin', timeframe:'1h' }];
  restorePanels(panelsData);
  toast('Layout loaded');
}

function showSaveLayoutModal() {
  const overlay = document.getElementById('modalOverlay');
  document.getElementById('modalTitle').textContent = 'Save Layout';
  document.getElementById('modalBody').innerHTML = `
    <div class="modal-field">
      <label>Layout name</label>
      <input type="text" id="layout_name_input" placeholder="e.g. Main Setup" maxlength="32">
    </div>`;
  overlay.style.display = 'flex';
  const okBtn = document.getElementById('modalOk');
  const cancelBtn = document.getElementById('modalCancel');
  okBtn.textContent = 'Save';
  setTimeout(() => document.getElementById('layout_name_input').focus(), 50);
  okBtn.onclick = () => {
    const name = document.getElementById('layout_name_input').value.trim();
    if (!name) { toast('Enter a layout name'); return; }
    overlay.style.display = 'none';
    okBtn.textContent = 'Apply';
    saveNamedLayout(name);
  };
  cancelBtn.onclick = () => {
    overlay.style.display = 'none';
    okBtn.textContent = 'Apply';
  };
}

function showLayoutsModal() {
  const overlay  = document.getElementById('modalOverlay');
  const title    = document.getElementById('modalTitle');
  const body     = document.getElementById('modalBody');
  const okBtn    = document.getElementById('modalOk');
  const cancelBtn= document.getElementById('modalCancel');
  title.textContent = 'Saved Layouts';
  okBtn.style.display = 'none';
  cancelBtn.textContent = 'Close';

  function renderList() {
    const layouts = getSavedLayouts().slice().reverse();
    if (layouts.length === 0) {
      body.innerHTML = `<div class="layout-list"><p style="color:var(--text-muted);font-size:12px;text-align:center;padding:20px 0">No saved layouts yet.<br>Use <b>Save</b> in the toolbar to save your setup.</p></div>`;
    } else {
      body.innerHTML = `<div class="layout-list">${layouts.map(l => `
        <div class="layout-item">
          <div class="layout-item-info">
            <div class="layout-item-name">${l.name}</div>
            <div class="layout-item-meta">${l.savedAt} · ${(l.panels||[]).length} panel(s) · ${l.layout||'l1'}</div>
          </div>
          <div class="layout-item-actions">
            <button class="layout-item-btn lload" data-name="${l.name}">Load</button>
            <button class="layout-item-btn danger ldel" data-name="${l.name}">✕</button>
          </div>
        </div>`).join('')}</div>`;
      body.querySelectorAll('.lload').forEach(btn => {
        btn.addEventListener('click', () => {
          const l = getSavedLayouts().find(x => x.name === btn.dataset.name);
          if (l) { overlay.style.display = 'none'; okBtn.style.display = ''; cancelBtn.textContent = 'Cancel'; applyLayoutData(l); }
        });
      });
      body.querySelectorAll('.ldel').forEach(btn => {
        btn.addEventListener('click', () => {
          deleteNamedLayout(btn.dataset.name);
          toast(`Deleted "${btn.dataset.name}"`);
          renderList();
        });
      });
    }
  }

  renderList();
  overlay.style.display = 'flex';
  cancelBtn.onclick = () => {
    overlay.style.display = 'none';
    okBtn.style.display = '';
    cancelBtn.textContent = 'Cancel';
  };
  okBtn.onclick = cancelBtn.onclick;
}

// ============================================================
// UPDATE changeSymbol to refresh tech info / order book
// ============================================================
const _origChangeSymbol = changeSymbol;
function changeSymbol(panel, symbol, symbolName) {
  panel.symbol = symbol;
  panel.symbolName = symbolName;
  panel.el.querySelector('.sym-name').textContent = symbol;
  [...panel.indicators].forEach(ind => removeIndicator(panel, ind.uid));
  loadPanelData(panel);
  renderSymbolList();
  autoSave();
  // Update right panel tabs if active
  if (state.activePanel === panel) {
    if (state.rightTab === 'orderbook') startOrderBook(symbol);
    if (state.rightTab === 'techinfo')  updateTechInfo(symbol, symbolName);
  }
}

// ============================================================
// INITIALIZATION
// ============================================================
function init() {
  loadSettings();

  // Build drawing toolbar
  buildDrawingToolbar();

  // Build indicator list
  renderIndicatorsList();

  // Watchlist UI
  renderWatchlistTabs();
  renderSymbolList();

  // Restore from auto-save, or create a default BTCUSDT panel
  const area = document.getElementById('chartsArea');
  let _restored = false;
  try {
    const raw = localStorage.getItem('cryptopro_autosave');
    if (raw) {
      const saved = JSON.parse(raw);
      if (saved && (saved.version === 1 || saved.version === 2)) {
        if (saved.theme) setTheme(saved.theme);
        if (saved.settings) state.settings = { ...state.settings, ...saved.settings };
        if (saved.alerts) { state.alerts = saved.alerts; updateAlertsBadge(); }
        if (saved.watchlists) {
          state.watchlists = JSON.parse(JSON.stringify(saved.watchlists));
          state.currentWatchlist = saved.currentWatchlist || Object.keys(saved.watchlists)[0];
          if (saved.wlSort) state.wlSort = saved.wlSort;
          renderWatchlistTabs();
          renderSymbolList();
        }
        if (saved.layout) {
          state.layout = saved.layout;
          area.className = `charts-area ${state.layout}`;
          document.querySelectorAll('#layoutBtns .btn').forEach(btn =>
            btn.classList.toggle('active', btn.dataset.layout === state.layout)
          );
        }
        if (saved.panels && saved.panels.length > 0) {
          _restored = true;
          restorePanels(saved.panels);
        }
      }
    }
  } catch(e) { console.error('[CryptoPro] Restore error:', e); }

  if (!_restored) {
    const initPanel = createPanel('BTCUSDT', 'Bitcoin', '1h');
    const el = buildPanelDOM(initPanel);
    area.appendChild(el);
    try { initChart(initPanel); } catch(e) { console.error('[CryptoPro] initChart error:', e); }
    loadPanelData(initPanel);
    setActivePanel(initPanel);
  }

  // Start price WebSocket
  startPriceWS();

  // Load initial prices
  const wl = state.watchlists[state.currentWatchlist];
  wl.forEach(s => {
    fetchPriceExchange(s.symbol).then(p => {
      if (p) { state.prices[s.symbol] = p; updateSymbolPrice(s.symbol); }
    });
  });

  // Init splitters
  initSplitters();

  // Load all pairs in background for search
  initAllPairs();

  // Init alerts list
  renderAlertsList();
  updateAlertsBadge();

  // ── EVENT LISTENERS ──

  // Panel toggle buttons
  document.getElementById('btnToggleLeft').addEventListener('click', () => {
    document.getElementById('leftPanel').classList.toggle('collapsed');
  });
  document.getElementById('btnToggleRight').addEventListener('click', () => {
    document.getElementById('rightPanel').classList.toggle('collapsed');
    document.getElementById('splitterRight').style.display =
      document.getElementById('rightPanel').classList.contains('collapsed') ? 'none' : '';
  });

  // Right panel tabs
  document.querySelectorAll('.right-tab').forEach(tab => {
    tab.addEventListener('click', () => switchRightTab(tab.dataset.rtab));
  });

  // Layout buttons
  document.querySelectorAll('#layoutBtns .btn').forEach(btn => {
    btn.addEventListener('click', () => setLayout(btn.dataset.layout));
  });

  // Global timeframe buttons
  document.querySelectorAll('#globalTfBtns .tf-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      if (!state.activePanel) return;
      const tf = btn.dataset.tf;
      state.activePanel.timeframe = tf;
      state.activePanel.el.querySelectorAll('.tf-btn').forEach(b => b.classList.toggle('active', b.dataset.tf===tf));
      document.querySelectorAll('#globalTfBtns .tf-btn').forEach(b => b.classList.toggle('active', b.dataset.tf===tf));
      loadPanelData(state.activePanel);
      autoSave();
    });
  });

  // Theme button
  document.getElementById('btnTheme').addEventListener('click', () => {
    setTheme(state.theme==='dark'?'light':'dark');
  });

  // Alerts button
  document.getElementById('btnAlerts').addEventListener('click', () => {
    document.getElementById('alertsOverlay').classList.toggle('open');
  });
  document.getElementById('btnCloseAlerts').addEventListener('click', () => {
    document.getElementById('alertsOverlay').classList.remove('open');
  });
  document.getElementById('btnAddAlert').addEventListener('click', () => {
    showAddAlertModal(state.activePanel?.symbol, state.activePanel ? state.prices[state.activePanel.symbol]?.price : null);
  });

  // Settings button
  document.getElementById('btnSettings').addEventListener('click', showSettings);
  document.getElementById('btnCloseSettings').addEventListener('click', hideSettings);

  // Settings: up/down color
  document.getElementById('settingUpColor').addEventListener('input', e => {
    state.settings.upColor = e.target.value;
    applyChartColors(); saveSettings();
  });
  document.getElementById('settingDownColor').addEventListener('input', e => {
    state.settings.downColor = e.target.value;
    applyChartColors(); saveSettings();
  });

  // Indicator search
  document.getElementById('indSearch').addEventListener('input', e => {
    state.indFilter = e.target.value;
    renderIndicatorsList();
  });

  // Symbol search — enhanced with all-pairs
  const symSearchInput = document.getElementById('symSearch');
  const symSearchResults = document.getElementById('symSearchResults');
  symSearchInput.addEventListener('input', e => {
    const q = e.target.value;
    if (q.length > 1) {
      handleSymbolSearch(q);
    } else {
      if (symSearchResults) symSearchResults.style.display = 'none';
      state.symFilter = q;
      renderSymbolList();
    }
  });
  // Hide results on outside click
  document.addEventListener('click', e => {
    if (symSearchResults && !symSearchResults.contains(e.target) && e.target !== symSearchInput) {
      symSearchResults.style.display = 'none';
    }
  });
  symSearchInput.addEventListener('keydown', e => {
    if (e.key === 'Escape') { symSearchResults.style.display='none'; symSearchInput.value=''; state.symFilter=''; renderSymbolList(); }
  });

  // Watchlist column sort headers
  document.getElementById('wlColHeader').querySelectorAll('.wlch[data-sort]').forEach(el => {
    el.addEventListener('click', () => {
      const col = el.dataset.sort;
      if (state.wlSort.col === col) {
        state.wlSort.dir = state.wlSort.dir === 'asc' ? 'desc' : 'asc';
      } else {
        state.wlSort.col = col;
        state.wlSort.dir = col === 'name' ? 'asc' : 'desc';
      }
      renderSymbolList();
    });
  });

  // Watchlist footer buttons
  document.getElementById('btnAddWatchlist').addEventListener('click', showAddWatchlistModal);
  document.getElementById('btnAddSymbol').addEventListener('click', showAddSymbolModal);

  // Save Layout / Layouts modal buttons
  document.getElementById('btnSaveLayout').addEventListener('click', showSaveLayoutModal);
  document.getElementById('btnLayouts').addEventListener('click', showLayoutsModal);

  // Close context menu on outside click
  document.addEventListener('click', e => {
    const menu = document.getElementById('ctxMenu');
    if (!menu.contains(e.target)) closeContextMenu();
  });

  // Close modal on overlay click
  document.getElementById('modalOverlay').addEventListener('click', e => {
    if (e.target === document.getElementById('modalOverlay'))
      document.getElementById('modalOverlay').style.display = 'none';
  });

  // Notification permission request
  if (Notification?.permission === 'default') Notification.requestPermission();

  // Keyboard shortcuts
  document.addEventListener('keydown', e => {
    const tag = (e.target.tagName||'').toLowerCase();
    if (tag === 'input' || tag === 'textarea' || tag === 'select') return;

    if (e.key === 's' && (e.ctrlKey || e.metaKey)) { e.preventDefault(); showSaveLayoutModal(); return; }
    if (e.key === 'Escape') {
      document.getElementById('modalOverlay').style.display = 'none';
      document.getElementById('settingsOverlay').classList.remove('open');
      document.getElementById('alertsOverlay').classList.remove('open');
      closeContextMenu();
      if (ds.active) cancelDrawing();
      else setDrawingTool('cursor');
    }
    const shortcuts = { 't':'trendline','h':'hline','v':'vline','r':'rect',
                        'f':'fib','m':'measure','Backspace':'eraser','Delete':'eraser' };
    if (shortcuts[e.key]) setDrawingTool(shortcuts[e.key]);
  });
}

function applyChartColors() {
  const uc = state.settings.upColor || '#26a69a';
  const dc = state.settings.downColor || '#ef5350';
  state.panels.forEach(p => {
    if (p.candleSeries) p.candleSeries.applyOptions({ upColor:uc, downColor:dc, wickUpColor:uc, wickDownColor:dc });
  });
}

// Start when ready — use load event so all scripts are done
window.addEventListener('load', () => {
  if (typeof LightweightCharts === 'undefined') {
    document.getElementById('chartsArea').innerHTML =
      `<div style="display:flex;align-items:center;justify-content:center;height:100%;color:var(--red);font-size:13px;text-align:center;padding:20px">
        <div>
          <strong>⚠ Charting library failed to load.</strong><br><br>
          Check your internet connection and refresh the page.<br>
          <small style="color:var(--text-muted)">CDN: unpkg.com/lightweight-charts</small>
        </div>
      </div>`;
    return;
  }
  // Give the browser one animation frame to lay out the flex grid
  requestAnimationFrame(() => requestAnimationFrame(init));
});
</script>
