let uidCounter = 0;

function addIndicator(panel, defId, params) {
  const def = INDICATORS_DEF.find(d => d.id === defId);
  if (!def) return;

  const uid = `ind_${++uidCounter}`;
  const colorIdx = panel.indicators.length % COLORS.length;
  const color = COLORS[colorIdx];

  const ind = { uid, defId, def, params, color, series: [], subChart: null };
  panel.indicators.push(ind);

  if (panel.data.length > 0) {
    updateIndicatorSeries(panel, ind);
  }

  renderIndChips(panel);
  autoSave();
  return ind;
}

function updateIndicatorSeries(panel, ind) {
  // Remove old series
  ind.series.forEach(s => {
    try {
      if (ind.subChart) ind.subChart.chart.removeSeries(s);
      else panel.chart.removeSeries(s);
    } catch(e){}
  });
  ind.series = [];

  // Remove old sub-chart if oscillator
  if (ind.subChart) {
    destroySubChart(panel, ind.subChart);
    ind.subChart = null;
  }

  if (panel.data.length === 0) return;
  const data = panel.data;
  const p = ind.params;

  switch(ind.defId) {
    case 'sma': {
      const vals = calcSMA(data, p.period||20);
      const s = panel.chart.addLineSeries({ color: ind.color, lineWidth: 1, priceLineVisible: false });
      s.setData(vals); ind.series.push(s);
      break;
    }
    case 'ema': {
      const vals = calcEMA(data, p.period||20);
      const s = panel.chart.addLineSeries({ color: ind.color, lineWidth: 1, priceLineVisible: false });
      s.setData(vals); ind.series.push(s);
      break;
    }
    case 'wma': {
      const vals = calcWMA(data, p.period||20);
      const s = panel.chart.addLineSeries({ color: ind.color, lineWidth: 1, priceLineVisible: false });
      s.setData(vals); ind.series.push(s);
      break;
    }
    case 'bb': {
      const { mid, upper, lower } = calcBB(data, p.period||20, p.mult||2);
      const opt = { lineWidth: 1, priceLineVisible: false };
      const sm = panel.chart.addLineSeries({ ...opt, color: ind.color });
      const su = panel.chart.addLineSeries({ ...opt, color: ind.color, lineStyle: 2 });
      const sl = panel.chart.addLineSeries({ ...opt, color: ind.color, lineStyle: 2 });
      sm.setData(mid); su.setData(upper); sl.setData(lower);
      ind.series.push(sm, su, sl);
      break;
    }
    case 'vwap': {
      const vals = calcVWAP(data);
      const s = panel.chart.addLineSeries({ color: ind.color, lineWidth: 2, priceLineVisible: false, lineStyle: 3 });
      s.setData(vals); ind.series.push(s);
      break;
    }
    case 'ich': {
      const { tenkanLine, kijunLine, chikouLine, senkouA, senkouB } = calcIchimoku(data, p.tenkan||9, p.kijun||26, p.senkou||52);
      const opt = { lineWidth: 1, priceLineVisible: false };
      const st = panel.chart.addLineSeries({ ...opt, color: '#26a69a' });
      const sk = panel.chart.addLineSeries({ ...opt, color: '#ef5350' });
      const sc = panel.chart.addLineSeries({ ...opt, color: '#787b86', lineStyle: 2 });
      const sa = panel.chart.addLineSeries({ ...opt, color: '#26a69a66' });
      const sb = panel.chart.addLineSeries({ ...opt, color: '#ef535066' });
      if (tenkanLine.length) st.setData(tenkanLine);
      if (kijunLine.length) sk.setData(kijunLine);
      if (chikouLine.length) sc.setData(chikouLine);
      if (senkouA.length) sa.setData(senkouA);
      if (senkouB.length) sb.setData(senkouB);
      ind.series.push(st,sk,sc,sa,sb);
      break;
    }
    case 'psar': {
      const vals = calcPSAR(data, p.step||0.02, p.maxaf||0.2);
      const s = panel.chart.addLineSeries({ color: ind.color, lineWidth: 1, lineStyle: 4, priceLineVisible: false });
      s.setData(vals); ind.series.push(s);
      break;
    }
    case 'dema': {
      const vals = calcDEMA(data, p.period||21);
      const s = panel.chart.addLineSeries({ color: ind.color, lineWidth: 1, priceLineVisible: false });
      s.setData(vals); ind.series.push(s);
      break;
    }
    case 'tema': {
      const vals = calcTEMA(data, p.period||21);
      const s = panel.chart.addLineSeries({ color: ind.color, lineWidth: 1, priceLineVisible: false });
      s.setData(vals); ind.series.push(s);
      break;
    }
    case 'pivot': {
      const { pivot, r1, r2, s1, s2 } = calcPivots(data);
      const opt = { lineWidth: 1, priceLineVisible: false, lineStyle: 1 };
      const sp = panel.chart.addLineSeries({ ...opt, color: '#ffffff88' });
      const sr1 = panel.chart.addLineSeries({ ...opt, color: '#26a69a88' });
      const sr2 = panel.chart.addLineSeries({ ...opt, color: '#26a69a55' });
      const ss1 = panel.chart.addLineSeries({ ...opt, color: '#ef535088' });
      const ss2 = panel.chart.addLineSeries({ ...opt, color: '#ef535055' });
      sp.setData(pivot); sr1.setData(r1); sr2.setData(r2); ss1.setData(s1); ss2.setData(s2);
      ind.series.push(sp,sr1,sr2,ss1,ss2);
      break;
    }
    // OSCILLATORS (sub-charts)
    case 'rsi': {
      const vals = calcRSI(data, p.period||14);
      ind.subChart = createSubChart(panel, `RSI(${p.period||14})`);
      const sc = ind.subChart.chart;
      const sr = sc.addLineSeries({ color: ind.color, lineWidth: 1, priceLineVisible: false });
      sr.setData(vals);
      sr.createPriceLine({ price:70, color:'#ef535055', lineWidth:1, lineStyle:2, axisLabelVisible:false });
      sr.createPriceLine({ price:30, color:'#26a69a55', lineWidth:1, lineStyle:2, axisLabelVisible:false });
      sr.createPriceLine({ price:50, color:'#78787844', lineWidth:1, lineStyle:4, axisLabelVisible:false });
      ind.series.push(sr);
      sc.priceScale('right').applyOptions({ autoScale:false, minimum:0, maximum:100 });
      break;
    }
    case 'macd': {
      const { macdLine, signalLine, hist } = calcMACD(data, p.fast||12, p.slow||26, p.sig||9);
      ind.subChart = createSubChart(panel, `MACD(${p.fast||12},${p.slow||26},${p.sig||9})`);
      const sc = ind.subChart.chart;
      const sh = sc.addHistogramSeries({ priceLineVisible:false, lastValueVisible:false });
      const sm = sc.addLineSeries({ color: '#2962ff', lineWidth: 1, priceLineVisible:false });
      const ss = sc.addLineSeries({ color: '#ff6d00', lineWidth: 1, priceLineVisible:false });
      sh.setData(hist); sm.setData(macdLine); ss.setData(signalLine);
      ind.series.push(sh,sm,ss);
      break;
    }
    case 'stoch': {
      const { k, d } = calcStoch(data, p.kp||14, p.dp||3);
      ind.subChart = createSubChart(panel, `Stoch(%K=${p.kp||14},%D=${p.dp||3})`);
      const sc = ind.subChart.chart;
      const sk = sc.addLineSeries({ color:'#2962ff', lineWidth:1, priceLineVisible:false });
      const sd = sc.addLineSeries({ color:'#ff6d00', lineWidth:1, priceLineVisible:false });
      sk.setData(k); sd.setData(d);
      sk.createPriceLine({ price:80, color:'#ef535055', lineWidth:1, lineStyle:2, axisLabelVisible:false });
      sk.createPriceLine({ price:20, color:'#26a69a55', lineWidth:1, lineStyle:2, axisLabelVisible:false });
      ind.series.push(sk,sd);
      sc.priceScale('right').applyOptions({ autoScale:false, minimum:0, maximum:100 });
      break;
    }
    case 'atr': {
      const vals = calcATR(data, p.period||14);
      ind.subChart = createSubChart(panel, `ATR(${p.period||14})`);
      const sc = ind.subChart.chart;
      const s = sc.addLineSeries({ color: ind.color, lineWidth:1, priceLineVisible:false });
      s.setData(vals); ind.series.push(s);
      break;
    }
    case 'adx': {
      const vals = calcADX(data, p.period||14);
      ind.subChart = createSubChart(panel, `ADX(${p.period||14})`);
      const sc = ind.subChart.chart;
      const s = sc.addLineSeries({ color: ind.color, lineWidth:1, priceLineVisible:false });
      s.setData(vals);
      s.createPriceLine({ price:25, color:'#78787866', lineWidth:1, lineStyle:2, axisLabelVisible:false });
      ind.series.push(s);
      break;
    }
    case 'cci': {
      const vals = calcCCI(data, p.period||20);
      ind.subChart = createSubChart(panel, `CCI(${p.period||20})`);
      const sc = ind.subChart.chart;
      const s = sc.addLineSeries({ color: ind.color, lineWidth:1, priceLineVisible:false });
      s.setData(vals);
      s.createPriceLine({ price:100, color:'#ef535055', lineWidth:1, lineStyle:2, axisLabelVisible:false });
      s.createPriceLine({ price:-100, color:'#26a69a55', lineWidth:1, lineStyle:2, axisLabelVisible:false });
      ind.series.push(s);
      break;
    }
    case 'obv': {
      const vals = calcOBV(data);
      ind.subChart = createSubChart(panel, 'OBV');
      const sc = ind.subChart.chart;
      const s = sc.addLineSeries({ color: ind.color, lineWidth:1, priceLineVisible:false });
      s.setData(vals); ind.series.push(s);
      break;
    }
    case 'willr': {
      const vals = calcWillR(data, p.period||14);
      ind.subChart = createSubChart(panel, `Williams%R(${p.period||14})`);
      const sc = ind.subChart.chart;
      const s = sc.addLineSeries({ color: ind.color, lineWidth:1, priceLineVisible:false });
      s.setData(vals);
      s.createPriceLine({ price:-20, color:'#ef535055', lineWidth:1, lineStyle:2, axisLabelVisible:false });
      s.createPriceLine({ price:-80, color:'#26a69a55', lineWidth:1, lineStyle:2, axisLabelVisible:false });
      ind.series.push(s);
      sc.priceScale('right').applyOptions({ autoScale:false, minimum:-100, maximum:0 });
      break;
    }
    case 'mfi': {
      const vals = calcMFI(data, p.period||14);
      ind.subChart = createSubChart(panel, `MFI(${p.period||14})`);
      const sc = ind.subChart.chart;
      const s = sc.addLineSeries({ color: ind.color, lineWidth:1, priceLineVisible:false });
      s.setData(vals);
      s.createPriceLine({ price:80, color:'#ef535055', lineWidth:1, lineStyle:2, axisLabelVisible:false });
      s.createPriceLine({ price:20, color:'#26a69a55', lineWidth:1, lineStyle:2, axisLabelVisible:false });
      ind.series.push(s);
      sc.priceScale('right').applyOptions({ autoScale:false, minimum:0, maximum:100 });
      break;
    }
    case 'roc': {
      const vals = calcROC(data, p.period||12);
      ind.subChart = createSubChart(panel, `ROC(${p.period||12})`);
      const sc = ind.subChart.chart;
      const s = sc.addLineSeries({ color: ind.color, lineWidth:1, priceLineVisible:false });
      s.setData(vals);
      s.createPriceLine({ price:0, color:'#78787855', lineWidth:1, lineStyle:2, axisLabelVisible:false });
      ind.series.push(s);
      break;
    }
    // ── NEW v2 indicators ──
    case 'supertrend': {
      const { up, dn } = calcSupertrend(data, p.period||10, p.mult||3);
      const opt = { lineWidth:2, priceLineVisible:false };
      const su = panel.chart.addLineSeries({ ...opt, color:'#26a69a' });
      const sd = panel.chart.addLineSeries({ ...opt, color:'#ef5350' });
      if (up.length) su.setData(up);
      if (dn.length) sd.setData(dn);
      ind.series.push(su, sd);
      break;
    }
    case 'keltner': {
      const { mid, upper, lower } = calcKeltner(data, p.period||20, p.mult||1.5, p.atrp||10);
      const opt = { lineWidth:1, priceLineVisible:false };
      const sm = panel.chart.addLineSeries({ ...opt, color:ind.color });
      const su = panel.chart.addLineSeries({ ...opt, color:ind.color, lineStyle:2 });
      const sl = panel.chart.addLineSeries({ ...opt, color:ind.color, lineStyle:2 });
      sm.setData(mid); su.setData(upper); sl.setData(lower);
      ind.series.push(sm, su, sl);
      break;
    }
    case 'donchian': {
      const { upper, mid, lower } = calcDonchian(data, p.period||20);
      const opt = { lineWidth:1, priceLineVisible:false };
      const su = panel.chart.addLineSeries({ ...opt, color:ind.color, lineStyle:2 });
      const sm = panel.chart.addLineSeries({ ...opt, color:ind.color, lineStyle:3 });
      const sl = panel.chart.addLineSeries({ ...opt, color:ind.color, lineStyle:2 });
      su.setData(upper); sm.setData(mid); sl.setData(lower);
      ind.series.push(su, sm, sl);
      break;
    }
    case 'volprofile': {
      // Rendered as SVG overlay on the main chart div
      ind.vpBins = p.bins || 30;
      ind.vpData = data;
      renderVolumeProfile(panel, ind);
      break;
    }
  }
}

function createSubChart(panel, label) {
  const container = panel.el.querySelector(`#${panel.id}_subcharts`);
  const wrap = document.createElement('div');
  wrap.className = 'sub-chart-wrap';
  wrap.innerHTML = `<span class="sub-chart-label">${label}</span><span class="sub-chart-close">✕</span>`;
  container.appendChild(wrap);

  const chartDiv = document.createElement('div');
  chartDiv.style.cssText = 'width:100%;height:100%;';
  wrap.appendChild(chartDiv);

  const chart = LightweightCharts.createChart(chartDiv, {
    ...getChartOptions(state.theme),
    width: wrap.clientWidth,
    height: 130,
    timeScale: {
      ...getChartOptions(state.theme).timeScale,
      visible: false,
    },
  });

  const subChartObj = { wrap, chart, label };
  panel.subCharts.push(subChartObj);

  // Sync sub-chart scroll with main chart
  chart.timeScale().subscribeVisibleLogicalRangeChange(range => {
    if (!range || panel.syncing) return;
    panel.syncing = true;
    try { panel.chart.timeScale().setVisibleLogicalRange(range); } catch(e){}
    panel.subCharts.forEach(sc => {
      if (sc !== subChartObj) {
        try { sc.chart.timeScale().setVisibleLogicalRange(range); } catch(e){}
      }
    });
    panel.syncing = false;
  });

  // Resize observer
  new ResizeObserver(() => {
    try { chart.resize(wrap.clientWidth, 130); } catch(e){}
  }).observe(wrap);

  // Close button
  wrap.querySelector('.sub-chart-close').addEventListener('click', () => {
    // Find the indicator using this subChart and remove it
    const ind = panel.indicators.find(i => i.subChart === subChartObj);
    if (ind) removeIndicator(panel, ind.uid);
  });

  return subChartObj;
}

function destroySubChart(panel, subChart) {
  if (!subChart) return;
  try { subChart.chart.remove(); } catch(e){}
  if (subChart.wrap && subChart.wrap.parentNode)
    subChart.wrap.parentNode.removeChild(subChart.wrap);
  panel.subCharts = panel.subCharts.filter(sc => sc !== subChart);
}

function removeIndicator(panel, uid) {
  const ind = panel.indicators.find(i => i.uid === uid);
  if (!ind) return;
  // Remove series
  ind.series.forEach(s => {
    try {
      if (ind.subChart) ind.subChart.chart.removeSeries(s);
      else panel.chart.removeSeries(s);
    } catch(e){}
  });
  ind.series = [];
  // Remove sub-chart
  if (ind.subChart) {
    destroySubChart(panel, ind.subChart);
    ind.subChart = null;
  }
  // Volume profile overlay cleanup
  if (ind.defId === 'volprofile') removeVolumeProfileOverlay(panel, ind);
  panel.indicators = panel.indicators.filter(i => i.uid !== uid);
  renderIndChips(panel);
  autoSave();
}

function renderIndChips(panel) {
  const container = panel.el.querySelector(`#${panel.id}_inds`);
  if (!container) return;
  container.innerHTML = '';
  panel.indicators.forEach(ind => {
    const chip = document.createElement('span');
    chip.className = 'ind-chip';
    chip.style.cssText = `background:${ind.color}22;color:${ind.color};border-color:${ind.color}44`;
    chip.innerHTML = `<span>${ind.def.name}</span><span class="chip-x" title="Remove">✕</span>`;
    chip.querySelector('.chip-x').addEventListener('click', e => {
      e.stopPropagation();
      removeIndicator(panel, ind.uid);
    });
    container.appendChild(chip);
  });
}

// LAYOUT MANAGEMENT
// ============================================================
const LAYOUT_COUNTS = { l1:1, l2h:2, l2v:2, l4:4 };

function setLayout(layout) {
  state.layout = layout;
  const area = document.getElementById('chartsArea');
  area.className = `charts-area ${layout}`;
  const needed = LAYOUT_COUNTS[layout];
  const current = state.panels.length;

  if (needed > current) {
    for (let i = current; i < needed; i++) {
      const wl = state.watchlists[state.currentWatchlist];
      const sym = wl && wl[i] ? wl[i] : { symbol:'BTCUSDT', name:'Bitcoin' };
      const panel = createPanel(sym.symbol, sym.name, state.panels[0]?.timeframe||'1h');
      const el = buildPanelDOM(panel);
      area.appendChild(el);
      try { initChart(panel); } catch(e) { console.error('[CryptoPro] initChart error:', e); }
      loadPanelData(panel);
    }
  } else if (needed < current) {
    const toRemove = state.panels.slice(needed);
    toRemove.forEach(p => destroyPanel(p));
  }

  // Update layout button states
  document.querySelectorAll('#layoutBtns .btn').forEach(btn => {
    btn.classList.toggle('active', btn.dataset.layout === layout);
  });

  // Ensure we have an active panel
  if (!state.activePanel || !state.panels.includes(state.activePanel)) {
    if (state.panels.length > 0) setActivePanel(state.panels[0]);
  }
  autoSave();
}

function destroyPanel(panel) {
  if (panel.klineWS) { panel.klineWS.close(); panel.klineWS = null; }
  if (panel.resizeObs) { panel.resizeObs.disconnect(); }
  [...panel.subCharts].forEach(sc => destroySubChart(panel, sc));
  try { panel.chart.remove(); } catch(e){}
  if (panel.el && panel.el.parentNode) panel.el.parentNode.removeChild(panel.el);
  state.panels = state.panels.filter(p => p !== panel);
  if (state.activePanel === panel) {
    state.activePanel = state.panels[0] || null;
    if (state.activePanel) setActivePanel(state.activePanel);
  }
}

function closePanel(panelId) {
  if (state.panels.length <= 1) { toast('Cannot close the last chart'); return; }
  const panel = state.panels.find(p => p.id === panelId);
  if (panel) destroyPanel(panel);
  // Adjust layout
  const needed = state.panels.length;
  const area = document.getElementById('chartsArea');
  if (needed === 1) { state.layout='l1'; area.className='charts-area l1'; }
  else if (needed === 2) { state.layout='l2h'; area.className='charts-area l2h'; }
  document.querySelectorAll('#layoutBtns .btn').forEach(btn => {
    btn.classList.toggle('active', btn.dataset.layout === state.layout);
  });
}

function toggleFullscreen(panelId) {
  const panel = state.panels.find(p => p.id === panelId);
  if (!panel) return;
  if (document.fullscreenElement) {
    document.exitFullscreen();
  } else {
    panel.el.requestFullscreen && panel.el.requestFullscreen();
  }
}

function setTheme(theme) {
  state.theme = theme;
  document.documentElement.setAttribute('data-theme', theme);
  document.getElementById('themeIconDark').style.display = theme==='dark'?'block':'none';
  document.getElementById('themeIconLight').style.display = theme==='light'?'block':'none';

    panel.chart.applyOptions(opts);

      ...opts, timeScale: { ...opts.timeScale, visible:false }
    }));
  });
  autoSave();
}

function renderWatchlistTabs() {
  const tabs = document.getElementById('wlTabs');
  const names = Object.keys(state.watchlists);
  tabs.innerHTML = names.map(name =>
    `<div class="wl-tab ${name===state.currentWatchlist?'active':''}" data-wl="${name}">${name}</div>`
  ).join('') + `<div class="wl-add-btn" id="wlAddTabBtn" title="New Watchlist">＋</div>`;

  tabs.querySelectorAll('.wl-tab').forEach(tab => {
    tab.addEventListener('click', () => {
      state.currentWatchlist = tab.dataset.wl;
      renderWatchlistTabs();
      renderSymbolList();
    });
    tab.addEventListener('contextmenu', e => {
      e.preventDefault();
      showWatchlistContextMenu(e, tab.dataset.wl);
    });
  });
  tabs.querySelector('#wlAddTabBtn').addEventListener('click', showAddWatchlistModal);
}

function sortedWatchlist(wl) {
  const { col, dir } = state.wlSort;
  const sorted = [...wl];
  sorted.sort((a, b) => {
    let va, vb;
    if (col === 'name') {
      va = a.symbol; vb = b.symbol;
    } else if (col === 'price') {
      va = state.prices[a.symbol]?.price  ?? -Infinity;
      vb = state.prices[b.symbol]?.price  ?? -Infinity;
    } else if (col === 'chgval') {
      va = state.prices[a.symbol]?.chgVal ?? -Infinity;
      vb = state.prices[b.symbol]?.chgVal ?? -Infinity;
    } else { // chgpct
      va = state.prices[a.symbol]?.change24h ?? -Infinity;
      vb = state.prices[b.symbol]?.change24h ?? -Infinity;
    }
    if (va < vb) return dir === 'asc' ? -1 : 1;
    if (va > vb) return dir === 'asc' ?  1 : -1;
    return 0;
  });
  return sorted;
}

function renderWlColHeader() {
  const header = document.getElementById('wlColHeader');
  if (!header) return;
  const { col, dir } = state.wlSort;
  header.querySelectorAll('.wlch[data-sort]').forEach(el => {
    el.classList.remove('sort-asc','sort-desc');
    if (el.dataset.sort === col) el.classList.add(dir === 'asc' ? 'sort-asc' : 'sort-desc');
  });
}

function renderSymbolList() {
  const list = document.getElementById('symList');
  const filter = state.symFilter.toLowerCase();
  const wl = state.watchlists[state.currentWatchlist] || [];
  const filtered = filter
    ? wl.filter(s => s.symbol.toLowerCase().includes(filter) || s.name.toLowerCase().includes(filter))
    : wl;
  const sorted = sortedWatchlist(filtered);
  renderWlColHeader();

  const activeSymbol = state.activePanel?.symbol;
  list.innerHTML = sorted.map(s => {
    const p    = state.prices[s.symbol];
    const up   = p ? p.change24h >= 0 : null;
    const abbr = s.symbol.replace('USDT','').slice(0,4);
    return `
      <div class="sym-item ${s.symbol===activeSymbol?'active':''}" data-sym="${s.symbol}" data-name="${s.name}">
        <div class="sym-cell-name">
          <div class="sym-icon">${abbr}</div>
          <div class="sym-info">
            <div class="sym-ticker">${s.symbol.replace('USDT','')}/USDT</div>
            <div class="sym-name-full">${s.name}</div>
          </div>
        </div>
        <div class="sym-cell-price">${p ? fmt(p.price) : '—'}</div>
        <div class="sym-cell-chgval ${up===null?'':(up?'up':'dn')}">${p ? (up?'+':'')+fmt(p.chgVal) : '—'}</div>
        <div class="sym-cell-chgpct ${up===null?'':(up?'up':'dn')}">${p ? fmtPct(p.change24h) : '—'}</div>
        <div class="sym-del-btn" title="Remove from watchlist" data-delsym="${s.symbol}">×</div>
      </div>`;
  }).join('');

  list.querySelectorAll('.sym-item').forEach(el => {
    el.addEventListener('click', e => {
      if (e.target.classList.contains('sym-del-btn')) return; // handled below
      if (state.activePanel) changeSymbol(state.activePanel, el.dataset.sym, el.dataset.name);
    });
    el.addEventListener('contextmenu', e => {
      e.preventDefault();
      showSymbolContextMenu(e, el.dataset.sym, el.dataset.name);
    });
  });

  list.querySelectorAll('.sym-del-btn').forEach(btn => {
    btn.addEventListener('click', e => {
      e.stopPropagation();
      const sym = btn.dataset.delsym;
      state.watchlists[state.currentWatchlist] =
        state.watchlists[state.currentWatchlist].filter(s => s.symbol !== sym);
      renderSymbolList();
      toast(`Removed ${sym}`);
      autoSave();
    });
  });
}

function showWatchlistContextMenu(e, wlName) {
  const menu = document.getElementById('ctxMenu');
  menu.innerHTML = `
    <div class="ctx-item" id="ctxRenameWl">Rename "${wlName}"</div>
    <div class="ctx-sep"></div>
    <div class="ctx-item danger" id="ctxDeleteWl">Delete "${wlName}"</div>
  `;
  positionContextMenu(menu, e.clientX, e.clientY);
  document.getElementById('ctxRenameWl').addEventListener('click', () => {
    closeContextMenu();
    showRenameWatchlistModal(wlName);
  });
  document.getElementById('ctxDeleteWl').addEventListener('click', () => {
    closeContextMenu();
    if (Object.keys(state.watchlists).length <= 1) { toast('Cannot delete the last watchlist'); return; }
    delete state.watchlists[wlName];
    if (state.currentWatchlist === wlName)
      state.currentWatchlist = Object.keys(state.watchlists)[0];
    renderWatchlistTabs();
    renderSymbolList();
    toast(`Deleted watchlist "${wlName}"`);
    autoSave();
  });
}

function showSymbolContextMenu(e, sym, name) {
  const menu = document.getElementById('ctxMenu');
  const wlNames = Object.keys(state.watchlists);
  menu.innerHTML = `
    <div class="ctx-item" id="ctxLoadSym">Load in Active Chart</div>
    <div class="ctx-sep"></div>
    ${wlNames.map(wl => wl !== state.currentWatchlist ? `<div class="ctx-item ctx-add-to-wl" data-wl="${wl}">Add to "${wl}"</div>` : '').join('')}
    ${wlNames.some(wl=>wl!==state.currentWatchlist)?'<div class="ctx-sep"></div>':''}
    <div class="ctx-item danger" id="ctxRemoveSym">Remove from Watchlist</div>
  `;
  positionContextMenu(menu, e.clientX, e.clientY);
  menu.querySelector('#ctxLoadSym').addEventListener('click', () => {
    closeContextMenu();
    if (state.activePanel) changeSymbol(state.activePanel, sym, name);
  });
  menu.querySelectorAll('.ctx-add-to-wl').forEach(el => {
    el.addEventListener('click', () => {
      closeContextMenu();
      const wl = el.dataset.wl;
      if (!state.watchlists[wl].find(s=>s.symbol===sym)) {
        state.watchlists[wl].push({ symbol:sym, name });
        toast(`Added ${sym} to "${wl}"`);
      } else {
        toast(`${sym} already in "${wl}"`);
      }
    });
  });
  menu.querySelector('#ctxRemoveSym').addEventListener('click', () => {
    closeContextMenu();
    state.watchlists[state.currentWatchlist] = state.watchlists[state.currentWatchlist].filter(s=>s.symbol!==sym);
    renderSymbolList();
    toast(`Removed ${sym}`);
  });
}

function positionContextMenu(menu, x, y) {
  menu.style.display = 'block';
  const rect = menu.getBoundingClientRect();
  const maxX = window.innerWidth - rect.width - 8;
  const maxY = window.innerHeight - rect.height - 8;
  menu.style.left = Math.min(x, maxX) + 'px';
  menu.style.top  = Math.min(y, maxY) + 'px';
}

function closeContextMenu() {
  document.getElementById('ctxMenu').style.display = 'none';
}

function renderIndicatorsList() {
  const list = document.getElementById('indicatorsList');
  const filter = state.indFilter.toLowerCase();
  const overlays = INDICATORS_DEF.filter(d => d.type==='overlay' && (d.name.toLowerCase().includes(filter)||d.full.toLowerCase().includes(filter)));
  const oscs   = INDICATORS_DEF.filter(d => d.type==='oscillator' && (d.name.toLowerCase().includes(filter)||d.full.toLowerCase().includes(filter)));

  let html = '';
  if (overlays.length) {
    html += `<div class="ind-group-label">Overlays</div>`;
    html += overlays.map(d => `
      <div class="ind-item" data-id="${d.id}">
        <div class="ind-dot" style="background:${d.color}"></div>
        <span class="ind-label">${d.full}</span>
        <span class="ind-abbr">${d.name}</span>
      </div>`).join('');
  }
  if (oscs.length) {
    html += `<div class="ind-group-label">Oscillators</div>`;
    html += oscs.map(d => `
      <div class="ind-item" data-id="${d.id}">
        <div class="ind-dot" style="background:${d.color}"></div>
        <span class="ind-label">${d.full}</span>
        <span class="ind-abbr">${d.name}</span>
      </div>`).join('');
  }
  list.innerHTML = html;

  list.querySelectorAll('.ind-item').forEach(el => {
    el.addEventListener('click', () => {
      const defId = el.dataset.id;
      const def = INDICATORS_DEF.find(d => d.id === defId);
      if (!def) return;
      if (def.params.length === 0) {
        if (!state.activePanel) { toast('Select a chart first'); return; }
        addIndicator(state.activePanel, defId, {});
        toast(`Added ${def.full}`);
      } else {
        showIndicatorModal(def);
      }
    });
  });
}

function showIndicatorModal(def) {
  const overlay = document.getElementById('modalOverlay');
  const title   = document.getElementById('modalTitle');
  const body    = document.getElementById('modalBody');
  title.textContent = def.full;
  body.innerHTML = def.params.map(p => `
    <div class="modal-field">
      <label>${p.l}</label>
      <input type="number" id="mp_${p.n}" value="${p.d}" min="${p.mn}" max="${p.mx}" step="${p.s||1}">
    </div>`).join('');
  overlay.style.display = 'flex';

  document.getElementById('modalOk').onclick = () => {
    const params = {};
    def.params.forEach(p => {
      const val = parseFloat(document.getElementById(`mp_${p.n}`).value);
      params[p.n] = isNaN(val) ? p.d : val;
    });
    overlay.style.display = 'none';
    if (!state.activePanel) { toast('Select a chart first'); return; }
    addIndicator(state.activePanel, def.id, params);
    toast(`Added ${def.full}`);
  };
  document.getElementById('modalCancel').onclick = () => {
    overlay.style.display = 'none';
  };
}

function showAddWatchlistModal() {
  const overlay = document.getElementById('modalOverlay');
  const title   = document.getElementById('modalTitle');
  const body    = document.getElementById('modalBody');
  title.textContent = 'New Watchlist';
  body.innerHTML = `<div class="modal-field"><label>Name</label><input type="text" id="wl_name" placeholder="e.g. Altcoins" maxlength="24"></div>`;
  overlay.style.display = 'flex';
  setTimeout(() => document.getElementById('wl_name').focus(), 50);
  document.getElementById('modalOk').onclick = () => {
    const name = document.getElementById('wl_name').value.trim();
    if (!name) { toast('Enter a name'); return; }
    if (state.watchlists[name]) { toast('Already exists'); return; }
    state.watchlists[name] = [];
    state.currentWatchlist = name;
    overlay.style.display = 'none';
    renderWatchlistTabs();
    renderSymbolList();
    toast(`Created "${name}"`);
    autoSave();
  };
  document.getElementById('modalCancel').onclick = () => overlay.style.display = 'none';
}

function showRenameWatchlistModal(oldName) {
  const overlay = document.getElementById('modalOverlay');
  document.getElementById('modalTitle').textContent = 'Rename Watchlist';
  document.getElementById('modalBody').innerHTML = `<div class="modal-field"><label>New Name</label><input type="text" id="wl_rename" value="${oldName}" maxlength="24"></div>`;
  overlay.style.display = 'flex';
  setTimeout(() => { const el=document.getElementById('wl_rename'); el.focus(); el.select(); }, 50);
  document.getElementById('modalOk').onclick = () => {
    const newName = document.getElementById('wl_rename').value.trim();
    if (!newName || newName===oldName) { overlay.style.display='none'; return; }
    if (state.watchlists[newName]) { toast('Name already taken'); return; }
    const entries = state.watchlists[oldName];
    delete state.watchlists[oldName];
    state.watchlists[newName] = entries;
    if (state.currentWatchlist===oldName) state.currentWatchlist=newName;
    overlay.style.display = 'none';
    renderWatchlistTabs();
    renderSymbolList();
    toast(`Renamed to "${newName}"`);
    autoSave();
  };
  document.getElementById('modalCancel').onclick = () => overlay.style.display='none';
}

function showAddSymbolModal() {
  const overlay = document.getElementById('modalOverlay');
  document.getElementById('modalTitle').textContent = 'Add Symbol to Watchlist';
  document.getElementById('modalBody').innerHTML = `
    <div class="modal-field">
      <label>Symbol (e.g. BTCUSDT)</label>
      <input type="text" id="sym_input" placeholder="BTCUSDT" style="text-transform:uppercase" maxlength="20">
    </div>
    <div class="modal-field">
      <label>Name (optional)</label>
      <input type="text" id="sym_name_input" placeholder="Bitcoin" maxlength="40">
    </div>`;
  overlay.style.display = 'flex';
  setTimeout(() => document.getElementById('sym_input').focus(), 50);
  document.getElementById('sym_input').addEventListener('input', function() {
    this.value = this.value.toUpperCase().replace(/[^A-Z0-9]/g,'');
  });
  document.getElementById('modalOk').onclick = async () => {
    const sym = document.getElementById('sym_input').value.trim().toUpperCase();
    const name = document.getElementById('sym_name_input').value.trim() || sym;
    if (!sym) { toast('Enter a symbol'); return; }
    // Quick validation against Binance
    const btn = document.getElementById('modalOk');
    btn.textContent = 'Checking...'; btn.disabled = true;
    try {
      const r = await fetch(`${BINANCE}/ticker/price?symbol=${sym}`);
      if (!r.ok) throw new Error('Not found');
      const existing = state.watchlists[state.currentWatchlist].find(s=>s.symbol===sym);
      if (existing) { toast(`${sym} already in watchlist`); }
      else {
        state.watchlists[state.currentWatchlist].push({ symbol:sym, name });
        renderSymbolList();
        toast(`Added ${sym}`);
        autoSave();
      }
      overlay.style.display = 'none';
    } catch(e) {
      toast(`${sym} not found on Binance`);
    } finally {
      btn.textContent = 'Apply'; btn.disabled = false;
    }
  };
  document.getElementById('modalCancel').onclick = () => overlay.style.display='none';
}

  measure:  `<line x1="3" y1="12" x2="21" y2="12" stroke="currentColor" stroke-width="2"/><line x1="3" y1="8" x2="3" y2="16" stroke="currentColor" stroke-width="2"/><line x1="21" y1="8" x2="21" y2="16" stroke="currentColor" stroke-width="2"/>`,
  eraser:   `<path d="M20 20H7L3 16l11.5-11.5a2 2 0 0 1 2.83 0l2.83 2.83a2 2 0 0 1 0 2.83L10 20" stroke="currentColor" stroke-width="2" fill="none"/>`,
};

// Drawing state
let ds = {
  tool: 'cursor',
  active: false,
  panel: null,
  p1: null, p2: null, p3: null,
  phase: 0,
  color: '#2962ff',
  width: 1.5,
};
let drawId = 0;

// ── Coordinate conversion ──
function pxToChartCoords(panel, x, y) {
  return {
    time:  panel.chart.timeScale().coordinateToTime(x) || 0,
    price: panel.candleSeries.coordinateToPrice(y) || 0,
  };
}

function coordToSVG(panel, time, price) {
  let x = panel.chart.timeScale().timeToCoordinate(time);
  let y = panel.candleSeries.priceToCoordinate(price);
  // If off-screen, extrapolate so clip-path handles it
  if (x === null) x = time < (panel.data[0]?.time||0) ? -9999 : 99999;
  if (y === null) y = -9999;
  return { x: +x, y: +y };
}

function getSVGPoint(panel, e) {
  const svg = panel.drawingOverlay;
  const rect = svg.getBoundingClientRect();
  return { x: e.clientX - rect.left, y: e.clientY - rect.top };
}

// ── Tool activation ──
function setDrawingTool(toolId) {
  ds.tool = toolId;
  if (ds.active) cancelDrawing();

  document.querySelectorAll('.dtool-btn').forEach(b =>
    b.classList.toggle('active', b.dataset.tool === toolId)
  );

  const drawMode = toolId !== 'cursor';
  document.querySelectorAll('.drawing-overlay').forEach(svg => {
    svg.classList.toggle('draw-active', drawMode);
  });
  document.querySelectorAll('.chart-body').forEach(el => {
    el.style.cursor = drawMode ? 'crosshair' : '';
  });
}

// ── Overlay setup ──
function addDrawingOverlay(panel) {
  panel.drawings = panel.drawings || [];
  const svg = panel.el.querySelector(`#${panel.id}_overlay`);
  if (!svg) return;
  panel.drawingOverlay = svg;

  svg.addEventListener('mousedown', e => onDrawMousedown(panel, e));
  svg.addEventListener('mousemove', e => onDrawMousemove(panel, e));
  svg.addEventListener('mouseup',   e => onDrawMouseup(panel, e));
  svg.addEventListener('contextmenu', e => {
    e.preventDefault();
    // Find nearest drawing for context menu
    const pt = getSVGPoint(panel, e);
    let best = null, bestDist = 12;
    for (const d of panel.drawings) {
      const dist = hitDist(panel, d, pt.x, pt.y);
      if (dist < bestDist) { bestDist = dist; best = d; }
    }
    if (!best) return;
    const menu = document.getElementById('ctxMenu');
    let html = `<div class="ctx-item ctx-del-drawing" data-did="${best.id}">Remove Drawing</div>`;
    if (best.type === 'hline') {
      html = `<div class="ctx-item ctx-alert-drawing" data-did="${best.id}" data-price="${best.p1.price}">🔔 Set Alert at ${fmt(best.p1.price)}</div><div class="ctx-sep"></div>` + html;
    }
    menu.innerHTML = html;
    positionContextMenu(menu, e.clientX, e.clientY);
    menu.querySelector('.ctx-del-drawing')?.addEventListener('click', () => {
      closeContextMenu();
      panel.drawings = panel.drawings.filter(d=>d.id!==best.id);
      renderDrawings(panel); autoSave();
    });
    menu.querySelector('.ctx-alert-drawing')?.addEventListener('click', () => {
      closeContextMenu();
      const price = parseFloat(menu.querySelector('.ctx-alert-drawing').dataset.price);
      showAddAlertModal(panel.symbol, price);
    });
  });
}

// ── Mouse handlers ──
function onDrawMousedown(panel, e) {
  e.stopPropagation();
  if (ds.tool === 'cursor') return;

  const pt = getSVGPoint(panel, e);
  const coord = pxToChartCoords(panel, pt.x, pt.y);
  setActivePanel(panel);

  if (ds.tool === 'eraser') { eraseAt(panel, pt.x, pt.y); return; }

  const needs = DRAW_TOOLS.find(t => t && t.id === ds.tool)?.needs || 2;

  if (!ds.active) {
    ds.active = true; ds.panel = panel; ds.phase = 1;
    ds.p1 = coord; ds.p2 = { ...coord }; ds.p3 = null;
    if (needs === 1) { finalizeDrawing(panel); }
  } else if (ds.phase === 1) {
    ds.p2 = coord;
    if (needs <= 2) { finalizeDrawing(panel); }
    else { ds.phase = 2; ds.p3 = { ...coord }; }
  } else if (ds.phase === 2) {
    ds.p3 = coord;
    finalizeDrawing(panel);
  }
}

function onDrawMousemove(panel, e) {
  if (!ds.active || ds.panel !== panel) return;
  const pt = getSVGPoint(panel, e);
  const coord = pxToChartCoords(panel, pt.x, pt.y);
  if (ds.phase === 1) ds.p2 = coord;
  else if (ds.phase === 2) ds.p3 = coord;
  renderDrawings(panel);
}

function onDrawMouseup(panel, e) { e.stopPropagation(); }

function cancelDrawing() {
  ds.active = false; ds.phase = 0;
  if (ds.panel) renderDrawings(ds.panel);
  ds.panel = null;
}

function finalizeDrawing(panel) {
  if (!ds.p1) { cancelDrawing(); return; }

  if (ds.tool === 'text') {
    const txt = window.prompt('Enter annotation text:', 'Note');
    if (!txt) { cancelDrawing(); return; }
    panel.drawings.push({
      id: `d${++drawId}`, type: 'text',
      p1: { ...ds.p1 }, text: txt, color: ds.color, fontSize: 13,
    });
  } else {
    panel.drawings.push({
      id: `d${++drawId}`, type: ds.tool,
      p1: { ...ds.p1 },
      p2: ds.p2 ? { ...ds.p2 } : { ...ds.p1 },
      p3: ds.p3 ? { ...ds.p3 } : null,
      color: ds.color, width: ds.width,
    });
  }

  ds.active = false; ds.phase = 0;
  renderDrawings(panel);
  autoSave();
}

// ── Eraser ──
function eraseAt(panel, mx, my) {
  const THRESH = 10;
  let best = null, bestDist = Infinity;
  for (const d of panel.drawings) {
    const dist = hitDist(panel, d, mx, my);
    if (dist < THRESH && dist < bestDist) { bestDist = dist; best = d; }
  }
  if (best) {
    panel.drawings = panel.drawings.filter(d => d.id !== best.id);
    renderDrawings(panel);
    toast('Drawing removed');
  }
}

function hitDist(panel, d, mx, my) {
  const c1 = d.p1 ? coordToSVG(panel, d.p1.time, d.p1.price) : null;
  const c2 = d.p2 ? coordToSVG(panel, d.p2.time, d.p2.price) : null;
  if (!c1) return Infinity;
  switch(d.type) {
    case 'hline':    return Math.abs(my - c1.y);
    case 'vline':    return Math.abs(mx - c1.x);
    case 'text':     return Math.hypot(mx - c1.x, my - c1.y);
    default:
      if (!c2) return Math.hypot(mx - c1.x, my - c1.y);
      return distSeg(mx, my, c1.x, c1.y, c2.x, c2.y);
  }
}

function distSeg(px, py, x1, y1, x2, y2) {
  const dx = x2-x1, dy = y2-y1, l2 = dx*dx+dy*dy;
  if (l2 === 0) return Math.hypot(px-x1, py-y1);
  const t = Math.max(0, Math.min(1, ((px-x1)*dx+(py-y1)*dy)/l2));
  return Math.hypot(px-(x1+t*dx), py-(y1+t*dy));
}

// ── Rendering ──
function renderDrawings(panel) {
  const svg = panel.drawingOverlay;
  if (!svg) return;
  // Clear all except <defs>
  [...svg.children].forEach(c => { if (c.tagName !== 'defs') svg.removeChild(c); });

  const W = svg.clientWidth  || panel.el.querySelector(`#${panel.id}_chartdiv`).clientWidth  || 800;
  const H = svg.clientHeight || panel.el.querySelector(`#${panel.id}_chartdiv`).clientHeight || 400;

  panel.drawings.forEach(d => drawOne(panel, svg, d, W, H, false));

  if (ds.active && ds.panel === panel && ds.p1) {
    drawOne(panel, svg, {
      id:'__prev__', type: ds.tool,
      p1: ds.p1, p2: ds.p2 || ds.p1, p3: ds.p3,
      color: ds.color + 'bb', width: ds.width, text:'Preview',
    }, W, H, true);
  }
}

function mkEl(tag, attrs) {
  const el = document.createElementNS('http://www.w3.org/2000/svg', tag);
  for (const [k,v] of Object.entries(attrs)) if (v !== null && v !== undefined) el.setAttribute(k, String(v));
  return el;
}

function hexRGBA(hex, a) {
  if (!hex || hex.length < 7) return `rgba(41,98,255,${a})`;
  const r = parseInt(hex.slice(1,3),16);
  const g = parseInt(hex.slice(3,5),16);
  const b = parseInt(hex.slice(5,7),16);
  return `rgba(${r},${g},${b},${a})`;
}

function extendRay(x1,y1,x2,y2,W) {
  if (Math.abs(x2-x1) < 0.5) return [x2, -9999];
  const m = (y2-y1)/(x2-x1);
  return [W+200, y1 + m*(W+200-x1)];
}

function extendBoth(x1,y1,x2,y2,W) {
  if (Math.abs(x2-x1) < 0.5) return [x1,-9999,x1,99999];
  const m = (y2-y1)/(x2-x1);
  const b = y1 - m*x1;
  return [-200, m*(-200)+b, W+200, m*(W+200)+b];
}

function drawOne(panel, svg, d, W, H, isPreview) {
  const g = mkEl('g', { 'clip-path':`url(#${panel.id}_clip)`, opacity: isPreview ? 0.65 : 1 });
  const col = d.color || '#2962ff';
  const lw  = d.width || 1.5;
  const la  = { stroke: col, 'stroke-width': lw };

  const c1 = d.p1 ? coordToSVG(panel, d.p1.time, d.p1.price) : null;
  const c2 = d.p2 ? coordToSVG(panel, d.p2.time, d.p2.price) : null;
  const c3 = d.p3 ? coordToSVG(panel, d.p3.time, d.p3.price) : null;

  switch (d.type) {

    case 'trendline':
      if (!c1||!c2) break;
      g.appendChild(mkEl('line',   { x1:c1.x,y1:c1.y,x2:c2.x,y2:c2.y,...la }));
      g.appendChild(mkEl('circle', { cx:c1.x,cy:c1.y,r:4,fill:col }));
      g.appendChild(mkEl('circle', { cx:c2.x,cy:c2.y,r:4,fill:col }));
      break;

    case 'ray': {
      if (!c1||!c2) break;
      const [rx,ry] = extendRay(c1.x,c1.y,c2.x,c2.y,W);
      g.appendChild(mkEl('line',   { x1:c1.x,y1:c1.y,x2:rx,y2:ry,...la }));
      g.appendChild(mkEl('circle', { cx:c1.x,cy:c1.y,r:4,fill:col }));
      break;
    }

    case 'extline': {
      if (!c1||!c2) break;
      const [ex1,ey1,ex2,ey2] = extendBoth(c1.x,c1.y,c2.x,c2.y,W);
      g.appendChild(mkEl('line',   { x1:ex1,y1:ey1,x2:ex2,y2:ey2,...la }));
      g.appendChild(mkEl('circle', { cx:c1.x,cy:c1.y,r:4,fill:col }));
      g.appendChild(mkEl('circle', { cx:c2.x,cy:c2.y,r:4,fill:col }));
      break;
    }

    case 'hline':
      if (!c1) break;
      g.appendChild(mkEl('line', { x1:0,y1:c1.y,x2:W,y2:c1.y,...la,'stroke-dasharray':'6,4' }));
      { const t = mkEl('text', { x:W-5,y:c1.y-4,fill:col,'font-size':10,'text-anchor':'end','font-family':'monospace' });
        t.textContent = fmt(d.p1.price); g.appendChild(t); }
      break;

    case 'vline':
      if (!c1) break;
      g.appendChild(mkEl('line', { x1:c1.x,y1:0,x2:c1.x,y2:H,...la,'stroke-dasharray':'6,4' }));
      break;

    case 'rect': {
      if (!c1||!c2) break;
      const rx=Math.min(c1.x,c2.x), ry=Math.min(c1.y,c2.y);
      const rw=Math.abs(c2.x-c1.x), rh=Math.abs(c2.y-c1.y);
      g.appendChild(mkEl('rect', { x:rx,y:ry,width:rw,height:rh,fill:hexRGBA(col,0.1),stroke:col,'stroke-width':lw }));
      break;
    }

    case 'channel': {
      if (!c1||!c2) break;
      g.appendChild(mkEl('line', { x1:c1.x,y1:c1.y,x2:c2.x,y2:c2.y,...la }));
      if (c3) {
        const dy = c3.y - c1.y;
        g.appendChild(mkEl('line', { x1:c1.x,y1:c1.y+dy,x2:c2.x,y2:c2.y+dy,...la,'stroke-dasharray':'5,4' }));
        const fill = mkEl('polygon', {
          points:`${c1.x},${c1.y} ${c2.x},${c2.y} ${c2.x},${c2.y+dy} ${c1.x},${c1.y+dy}`,
          fill:hexRGBA(col,0.06), stroke:'none',
        });
        g.insertBefore(fill, g.firstChild);
      }
      break;
    }

    case 'fib': {
      if (!c1||!c2) break;
      const xL = Math.min(c1.x,c2.x), xR = Math.max(c1.x,c2.x);
      const fibLevels = [
        { r:0,    lbl:'0%',     col:'#ef5350' },
        { r:0.236,lbl:'23.6%', col:'#f7a600' },
        { r:0.382,lbl:'38.2%', col:'#9c27b0' },
        { r:0.5,  lbl:'50%',   col:'#2962ff' },
        { r:0.618,lbl:'61.8%', col:'#26a69a' },
        { r:0.786,lbl:'78.6%', col:'#607d8b' },
        { r:1,    lbl:'100%',  col:'#ef5350' },
      ];
      // Golden zone fill (38.2 – 61.8)
      const y382 = c2.y + 0.382*(c1.y-c2.y);
      const y618 = c2.y + 0.618*(c1.y-c2.y);
      g.appendChild(mkEl('rect', { x:xL, y:Math.min(y382,y618), width:xR-xL,
        height:Math.abs(y618-y382), fill:hexRGBA('#2962ff',0.07), stroke:'none' }));
      fibLevels.forEach(fl => {
        const y = c2.y + fl.r*(c1.y-c2.y);
        g.appendChild(mkEl('line', { x1:xL,y1:y,x2:xR,y2:y,stroke:fl.col,'stroke-width':1.5,'stroke-dasharray':'5,4' }));
        const t = mkEl('text', { x:xL+4,y:y-4,fill:fl.col,'font-size':9,'font-family':'monospace','font-weight':'600' });
        t.textContent = `${fl.lbl}  ${fmt(d.p2.price + fl.r*(d.p1.price-d.p2.price))}`;
        g.appendChild(t);
      });
      break;
    }

    case 'fibext': {
      if (!c1||!c2) break;
      const xL = Math.min(c1.x,c2.x), xR = Math.max(c1.x,c2.x);
      const range = c1.y - c2.y;
      const extLevels = [
        { r:0,    lbl:'0%',    col:'#ef5350' },
        { r:0.618,lbl:'61.8%',col:'#26a69a' },
        { r:1,    lbl:'100%', col:'#2962ff' },
        { r:1.618,lbl:'161.8%',col:'#f7a600' },
        { r:2.618,lbl:'261.8%',col:'#9c27b0' },
      ];
      extLevels.forEach(fl => {
        const y = c2.y - fl.r*range;
        g.appendChild(mkEl('line', { x1:xL,y1:y,x2:xR,y2:y,stroke:fl.col,'stroke-width':1.5,'stroke-dasharray':'5,4' }));
        const t = mkEl('text', { x:xL+4,y:y-4,fill:fl.col,'font-size':9,'font-family':'monospace','font-weight':'600' });
        t.textContent = `${fl.lbl}`;
        g.appendChild(t);
      });
      break;
    }

    case 'text': {
      if (!c1) break;
      const fz = d.fontSize || 13;
      const txt = d.text || 'Text';
      const bgW = txt.length * fz * 0.62 + 12;
      g.appendChild(mkEl('rect', { x:c1.x-4,y:c1.y-fz-2,width:bgW,height:fz+8,fill:hexRGBA(col,0.18),rx:3 }));
      const t = mkEl('text', { x:c1.x,y:c1.y,fill:col,'font-size':fz,'font-family':'-apple-system,sans-serif','font-weight':'600' });
      t.textContent = txt;
      g.appendChild(t);
      break;
    }

    case 'measure': {
      if (!c1||!c2) break;
      const rx=Math.min(c1.x,c2.x), ry=Math.min(c1.y,c2.y);
      const rw=Math.abs(c2.x-c1.x), rh=Math.abs(c2.y-c1.y);
      const up = d.p2.price > d.p1.price;
      const mcol = up ? '#26a69a' : '#ef5350';
      const pDiff = Math.abs(d.p2.price - d.p1.price);
      const pPct  = d.p1.price ? Math.abs((d.p2.price-d.p1.price)/d.p1.price*100) : 0;
      g.appendChild(mkEl('rect', { x:rx,y:ry,width:rw,height:rh,fill:hexRGBA(mcol,0.15),stroke:mcol,'stroke-width':1.5,'stroke-dasharray':'5,3' }));
      // Arrow in centre
      const cx=rx+rw/2, cy=ry+rh/2;
      const arrowH = Math.min(rh*0.4, 20);
      if (rh > 20) {
        g.appendChild(mkEl('line',   { x1:cx,y1:up?cy+arrowH:cy-arrowH,x2:cx,y2:up?cy-arrowH:cy+arrowH,stroke:mcol,'stroke-width':1.5 }));
        const arr = mkEl('polygon', { fill:mcol,stroke:'none' });
        if (up) arr.setAttribute('points',`${cx-5},${cy-arrowH+8} ${cx+5},${cy-arrowH+8} ${cx},${cy-arrowH}`);
        else    arr.setAttribute('points',`${cx-5},${cy+arrowH-8} ${cx+5},${cy+arrowH-8} ${cx},${cy+arrowH}`);
        g.appendChild(arr);
      }
      // Labels
      const t1 = mkEl('text', { x:cx,y:cy+(up?-6:14),fill:mcol,'font-size':11,'text-anchor':'middle','font-family':'monospace','font-weight':'700' });
      t1.textContent = `${up?'+':'−'}${fmt(pDiff)}`;
      const t2 = mkEl('text', { x:cx,y:cy+(up?8:28),fill:mcol,'font-size':10,'text-anchor':'middle','font-family':'monospace' });
      t2.textContent = `${up?'+':'−'}${pPct.toFixed(2)}%`;
      g.appendChild(t1); g.appendChild(t2);
      break;
    }
  }

  if (g.children.length) svg.appendChild(g);
}

// ── Toolbar builder ──
function buildDrawingToolbar() {
  const tb = document.getElementById('drawingToolbar');
  if (!tb) return;
  tb.innerHTML = '';

  // Color picker
  const colorWrap = document.createElement('div');
  colorWrap.style.cssText = 'display:flex;flex-direction:column;align-items:center;gap:2px;margin-bottom:3px;';
  const colorLbl = document.createElement('div');
  colorLbl.style.cssText = 'font-size:8px;color:var(--text-muted);text-transform:uppercase;letter-spacing:0.5px;margin-top:2px;';
  colorLbl.textContent = 'Color';
  const colorSwatch = document.createElement('div');
  colorSwatch.className = 'dtool-color';
  const colorIn = document.createElement('input');
  colorIn.type = 'color'; colorIn.value = ds.color;
  colorIn.title = 'Drawing color';
  colorIn.addEventListener('input', e => { ds.color = e.target.value; });
  colorSwatch.appendChild(colorIn);
  colorWrap.appendChild(colorLbl); colorWrap.appendChild(colorSwatch);
  tb.appendChild(colorWrap);

  // Separator
  const s0 = document.createElement('div'); s0.className = 'dtool-sep'; tb.appendChild(s0);

  DRAW_TOOLS.forEach(tool => {
    if (!tool) { const s = document.createElement('div'); s.className='dtool-sep'; tb.appendChild(s); return; }
    const btn = document.createElement('div');
    btn.className = 'dtool-btn' + (tool.id === 'cursor' ? ' active' : '');
    btn.dataset.tool = tool.id;
    btn.title = tool.label;
    btn.innerHTML = `<svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">${TOOL_ICONS[tool.id]||''}</svg>`;
    btn.addEventListener('click', () => setDrawingTool(tool.id));
    tb.appendChild(btn);
  });

  // Pinned bottom actions
  const spacer = document.createElement('div'); spacer.style.flex='1'; tb.appendChild(spacer);
  const sep2 = document.createElement('div'); sep2.className='dtool-sep'; tb.appendChild(sep2);

  // Export drawings
  const exportBtn = document.createElement('div');
  exportBtn.className = 'dtool-btn'; exportBtn.title = 'Export Drawings (JSON)';
  exportBtn.innerHTML = `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>`;
  exportBtn.addEventListener('click', () => exportDrawings(state.activePanel));
  tb.appendChild(exportBtn);

  // Import drawings
  const importLbl = document.createElement('div');
  importLbl.className = 'dtool-btn'; importLbl.title = 'Import Drawings (JSON)';
  importLbl.innerHTML = `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>`;
  const fileInput = document.createElement('input');
  fileInput.type='file'; fileInput.accept='.json'; fileInput.style.display='none';
  fileInput.addEventListener('change', e => {
    if (e.target.files[0] && state.activePanel) importDrawings(state.activePanel, e.target.files[0]);
    fileInput.value='';
  });
  importLbl.appendChild(fileInput);
  importLbl.addEventListener('click', () => { if(!state.activePanel){toast('Select a chart first');return;} fileInput.click(); });
  tb.appendChild(importLbl);

  const sep3 = document.createElement('div'); sep3.className='dtool-sep'; tb.appendChild(sep3);

function renderVolumeProfile(panel, ind) {
  // Remove old VP canvas
  const old = panel.el.querySelector('.vp-overlay');
  if (old) old.remove();
  if (!ind || !panel.data.length) return;

  const vp = calcVolumeProfile(panel.data, ind.vpBins || 30);
  if (!vp) return;

  const chartDiv = panel.el.querySelector(`#${panel.id}_chartdiv`);
  const W = 70, H = chartDiv.clientHeight || 400;

  const canvas = document.createElement('canvas');
  canvas.className = 'vp-overlay';
  canvas.width = W; canvas.height = H;
  canvas.style.cssText = `position:absolute;left:0;top:0;width:${W}px;height:${H}px;pointer-events:none;z-index:4;opacity:0.75;`;
  chartDiv.appendChild(canvas);
  ind._vpCanvas = canvas;

  function draw() {
    const ctx = canvas.getContext('2d');
    ctx.clearRect(0,0,W,H);
    const { profile, maxVol } = vp;
    for (const bin of profile) {
      const y1 = panel.candleSeries.priceToCoordinate(bin.priceH);
      const y2 = panel.candleSeries.priceToCoordinate(bin.priceL);
      if (y1===null||y2===null) continue;
      const barH = Math.max(1, Math.abs(y2-y1)-1);
      const barW = Math.max(2, (bin.vol/maxVol)*(W-4));
      const buyW = (bin.buyVol/bin.vol)*barW;
      ctx.fillStyle = '#26a69a88';
      ctx.fillRect(0, Math.min(y1,y2), buyW, barH);
      ctx.fillStyle = '#ef535066';
      ctx.fillRect(buyW, Math.min(y1,y2), barW-buyW, barH);
    }
  }

  draw();
  ind._vpDraw = draw;

  // Redraw on chart scroll/zoom
  panel.chart.timeScale().subscribeVisibleLogicalRangeChange(() => {
    requestAnimationFrame(draw);
  });
}

function removeVolumeProfileOverlay(panel, ind) {
  if (ind._vpCanvas) { ind._vpCanvas.remove(); ind._vpCanvas = null; }
}

let _alertCheckThrottle = {};

function checkAlerts(symbol, price) {
  const now = Date.now();
  if (now - (_alertCheckThrottle[symbol]||0) < 500) return;
  _alertCheckThrottle[symbol] = now;

  let triggered = false;
  state.alerts.forEach(a => {
    if (a.triggered || a.symbol !== symbol) return;
    if ((a.condition==='above' && price >= a.price) ||
        (a.condition==='below' && price <= a.price)) {
      a.triggered = true;
      triggered = true;
      showAlertNotification(a, price);
    }
  });
  if (triggered) { renderAlertsList(); updateAlertsBadge(); }
}

function showAlertNotification(alert, price) {
  const dir = alert.condition==='above' ? '▲' : '▼';
  toast(`🔔 ${alert.symbol} ${dir} ${fmt(alert.price)}  (${fmt(price)})`, 5000);
  // Browser notification if permitted
  if (Notification?.permission === 'granted') {
    new Notification(`Crypto Alert: ${alert.symbol}`, {
      body: `Price ${alert.condition} ${fmt(alert.price)} — now ${fmt(price)}`,
    });
  }
}

function addAlert(symbol, price, condition, note='') {
  state.alerts.push({ id: ++state.alertIdCounter, symbol, price, condition, note, triggered: false });
  renderAlertsList();
  updateAlertsBadge();
  autoSave();
  toast(`Alert set: ${symbol} ${condition} ${fmt(price)}`);
}

function removeAlert(id) {
  state.alerts = state.alerts.filter(a => a.id !== id);
  renderAlertsList();
  updateAlertsBadge();
  autoSave();
}

function updateAlertsBadge() {
  const active = state.alerts.filter(a => !a.triggered).length;
  const badge = document.getElementById('alertsBadge');
  if (badge) { badge.textContent = active; badge.style.display = active>0?'flex':'none'; }
}

function renderAlertsList() {
  const list = document.getElementById('alertsList');
  if (!list) return;
  if (!state.alerts.length) {
    list.innerHTML = `<div class="alerts-empty">No alerts set.<br>Right-click a horizontal line on the chart<br>or click "Add Alert" below.</div>`;
    return;
  }
  list.innerHTML = state.alerts.slice().reverse().map(a => `
    <div class="alert-item ${a.triggered?'triggered':''}">
      <div class="alert-dot ${a.triggered?'triggered':'active'}"></div>
      <div class="alert-info">
        <div class="alert-sym">${a.symbol}  <span style="color:${a.condition==='above'?'var(--green)':'var(--red)'};font-weight:700">${a.condition==='above'?'▲':'▼'} ${fmt(a.price)}</span></div>
        <div class="alert-cond">${a.triggered?'✓ Triggered':'Waiting'} ${a.note?'· '+a.note:''}</div>
      </div>
      <div class="alert-del" data-alert-id="${a.id}" title="Delete">×</div>
    </div>`).join('');
  list.querySelectorAll('.alert-del').forEach(btn => {
    btn.addEventListener('click', e => { e.stopPropagation(); removeAlert(parseInt(btn.dataset.alertId)); });
  });
}

function showAddAlertModal(symbol, suggestedPrice) {

    <div class="modal-field"><label>Symbol</label>

function handleSymbolSearch(query) {
  const q = query.trim().toUpperCase();
  const results = document.getElementById('symSearchResults');
  if (!results) return;

  if (!q) { results.style.display = 'none'; return; }

  // Search in watchlist first, then all pairs
  const wl = state.watchlists[state.currentWatchlist] || [];
  const wlMatches = wl.filter(s => s.symbol.includes(q) || s.name.toUpperCase().includes(q)).slice(0,5);

  const allMatches = (state.allPairs || [])
    .filter(s => s.symbol.includes(q) && !wlMatches.find(m=>m.symbol===s.symbol))
    .slice(0, 15 - wlMatches.length);

  const combined = [...wlMatches, ...allMatches];

  if (!combined.length) {
    results.innerHTML = `<div class="sym-search-result" style="color:var(--text-muted)">No results for "${q}"</div>`;
  } else {
    results.innerHTML = combined.map(s => {
      const inWl = !!wlMatches.find(m=>m.symbol===s.symbol);
      return `<div class="sym-search-result" data-sym="${s.symbol}" data-name="${s.name}">
        <div class="sym-icon" style="width:20px;height:20px;font-size:8px">${s.symbol.replace('USDT','').slice(0,4)}</div>
        <div style="flex:1;min-width:0">
          <div class="ssr-ticker">${s.symbol.replace('USDT','/USDT')}</div>
          <div class="ssr-name">${s.name}</div>
        </div>
        <div class="ssr-add">${inWl ? 'In list' : '+ Add'}</div>
      </div>`;
    }).join('');
  }
  results.style.display = 'block';

  results.querySelectorAll('.sym-search-result[data-sym]').forEach(el => {
    el.addEventListener('click', () => {
      const sym = el.dataset.sym, name = el.dataset.name;
      results.style.display = 'none';
      document.getElementById('symSearch').value = '';
      state.symFilter = '';
      // Load in active panel
      if (state.activePanel) changeSymbol(state.activePanel, sym, name);
      // Also add to current watchlist if not there
      const wl = state.watchlists[state.currentWatchlist];
      if (!wl.find(s=>s.symbol===sym)) {
        wl.push({ symbol:sym, name });
        renderSymbolList();
        startPriceWS();
        autoSave();
      }
    });
  });
}

let _obRenderTimer = null;

function startOrderBook(symbol) {
  if (state.orderBookWS) { state.orderBookWS.close(); state.orderBookWS = null; }
  state.obData = { bids:[], asks:[], symbol };
  document.getElementById('obSymLabel').textContent = symbol;
  document.getElementById('obMidPrice').textContent = '…';

  const ex = getExchange();
  if (ex.id === 'binance') {
    // REST snapshot first
    fetch(`${ex.rest}/depth?symbol=${symbol}&limit=20`)
      .then(r=>r.json()).then(d => {
        state.obData.bids = d.bids.map(([p,q])=>[parseFloat(p),parseFloat(q)]);
        state.obData.asks = d.asks.map(([p,q])=>[parseFloat(p),parseFloat(q)]);
        renderOrderBook();
      }).catch(()=>{});
    // WS updates
    const ws = new WebSocket(`wss://stream.binance.com:9443/ws/${symbol.toLowerCase()}@depth20@500ms`);
    ws.onmessage = e => {
      try {
        const d = JSON.parse(e.data);
        state.obData.bids = d.bids.map(([p,q])=>[parseFloat(p),parseFloat(q)]).sort((a,b)=>b[0]-a[0]).slice(0,20);
        state.obData.asks = d.asks.map(([p,q])=>[parseFloat(p),parseFloat(q)]).sort((a,b)=>a[0]-b[0]).slice(0,20);
        if (!_obRenderTimer) _obRenderTimer = requestAnimationFrame(()=>{ renderOrderBook(); _obRenderTimer=null; });
      } catch(err){}
    };
    ws.onerror=()=>{}; ws.onclose=()=>{};
    state.orderBookWS = ws;
  } else if (ex.id === 'bybit') {
    const ws = new WebSocket('wss://stream.bybit.com/v5/public/spot');
    ws.onopen = () => ws.send(JSON.stringify({op:'subscribe',args:[`orderbook.50.${symbol}`]}));
    ws.onmessage = e => {
      try {
        const msg = JSON.parse(e.data);
        if (!msg.data) return;
        const d = msg.data;
        if (msg.type === 'snapshot' || msg.type === 'delta') {
          if (d.b) state.obData.bids = d.b.map(([p,q])=>[parseFloat(p),parseFloat(q)]).filter(r=>r[1]>0).sort((a,b)=>b[0]-a[0]).slice(0,20);
          if (d.a) state.obData.asks = d.a.map(([p,q])=>[parseFloat(p),parseFloat(q)]).filter(r=>r[1]>0).sort((a,b)=>a[0]-b[0]).slice(0,20);
          if (!_obRenderTimer) _obRenderTimer = requestAnimationFrame(()=>{ renderOrderBook(); _obRenderTimer=null; });
        }
      } catch(err){}
    };
    ws.onerror=()=>{}; ws.onclose=()=>{};
    state.orderBookWS = ws;
  } else {
    // REST-only fallback: fetch and poll
    const pollOB = () => fetch(`${EXCHANGES.binance.rest}/depth?symbol=${symbol}&limit=20`)
      .then(r=>r.json()).then(d=>{
        state.obData.bids = d.bids.map(([p,q])=>[parseFloat(p),parseFloat(q)]);
        state.obData.asks = d.asks.map(([p,q])=>[parseFloat(p),parseFloat(q)]);
        renderOrderBook();
      }).catch(()=>{});
    pollOB();
    const t = setInterval(pollOB, 5000);
    state.orderBookWS = { close: ()=>clearInterval(t) };
  }
}

function renderOrderBook() {
  const { bids, asks, symbol } = state.obData;
  const asksEl = document.getElementById('obAsks');
  const bidsEl = document.getElementById('obBids');
  if (!asksEl || !bidsEl) return;

  const maxBid = bids.reduce((m,r)=>Math.max(m,r[1]),0);
  const maxAsk = asks.reduce((m,r)=>Math.max(m,r[1]),0);
  const maxVol = Math.max(maxBid, maxAsk);

  function rows(data, cls) {
    return data.slice(0,20).map(([price,qty]) => {
      const total = price*qty;
      const pct = maxVol>0 ? (qty/maxVol*100).toFixed(0) : 0;
      return `<div class="ob-row ${cls}" style="position:relative">
        <div class="ob-bar" style="width:${pct}%"></div>
        <div class="ob-price">${fmt(price,price<1?6:2)}</div>
        <div class="ob-qty">${fmtVol(qty)}</div>
        <div class="ob-total">${fmtVol(total)}</div>
      </div>`;
    }).join('');
  }

  asksEl.innerHTML = rows(asks.slice().reverse(), 'ask');
  bidsEl.innerHTML = rows(bids, 'bid');

  if (bids.length && asks.length) {
    const best_bid = bids[0][0], best_ask = asks[0][0];
    const mid = (best_bid + best_ask)/2;
    const spread = best_ask - best_bid;
    const spreadPct = mid > 0 ? (spread/mid*100).toFixed(3) : '0';
    const el = document.getElementById('obMidPrice');
    const price = state.prices[symbol]?.price || mid;
    if (el) {
      el.textContent = fmt(price, price<1?6:2);
      const up = price >= (state.prices[symbol]?.open24h || 0);
      el.style.color = up ? 'var(--green)' : 'var(--red)';
    }
    const spEl = document.getElementById('obSpreadPct');
    if (spEl) spEl.textContent = `Spread ${fmt(spread,spread<0.01?6:4)} (${spreadPct}%)`;
  }
  const ts = document.getElementById('obLastUpdate');
  if (ts) ts.textContent = new Date().toLocaleTimeString();
}

function fmtVol(n) {
  if (n>=1e9) return (n/1e9).toFixed(2)+'B';
  if (n>=1e6) return (n/1e6).toFixed(2)+'M';
  if (n>=1e3) return (n/1e3).toFixed(2)+'K';
  return n.toFixed(2);
}

function initSplitters() {
  const leftPanel  = document.getElementById('leftPanel');
  const rightPanel = document.getElementById('rightPanel');
  const splitterR  = document.getElementById('splitterRight');
  if (!splitterR) return;

  let dragging = null, startX = 0, startW = 0;

  function onMouseMove(e) {
    if (!dragging) return;
    const dx = e.clientX - startX;
    if (dragging === 'right') {
      const newW = Math.max(220, Math.min(520, startW - dx));
      rightPanel.style.width = newW + 'px';
    }
    // Trigger chart resize
    requestAnimationFrame(() => {
      state.panels.forEach(p => {
        if (p.chart) {
          const div = p.el.querySelector(`#${p.id}_chartdiv`);
          if (div) p.chart.resize(div.clientWidth, div.clientHeight);
        }
      });
    });
  }

  function onMouseUp() {
    if (dragging) {
      dragging = null;
      document.body.style.cursor = '';
      document.body.style.userSelect = '';
      splitterR.classList.remove('dragging');
    }
  }

  splitterR.addEventListener('mousedown', e => {
    dragging = 'right';
    startX = e.clientX;
    startW = rightPanel.offsetWidth;
    document.body.style.cursor = 'col-resize';
    document.body.style.userSelect = 'none';
    splitterR.classList.add('dragging');
    e.preventDefault();
  });

  document.addEventListener('mousemove', onMouseMove);
  document.addEventListener('mouseup', onMouseUp);
}
