<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Crypto Charting Pro</title>
<script src="https://unpkg.com/lightweight-charts@4.1.3/dist/lightweight-charts.standalone.production.js"></script>
<style>
:root[data-theme="dark"] {
  --bg-primary: #131722;
  --bg-secondary: #1e222d;
  --bg-tertiary: #2a2e39;
  --bg-hover: #363a45;
  --border: #2a2e39;
  --border-light: #363c4e;
  --text-primary: #d1d4dc;
  --text-secondary: #787b86;
  --text-muted: #4a4e59;
  --accent: #2962ff;
  --accent-hover: #1e53e5;
  --green: #26a69a;
  --red: #ef5350;
  --orange: #f7a600;
  --shadow: rgba(0,0,0,0.4);
  --chart-bg: #131722;
  --chart-grid: #1e222d;
  --chart-text: #787b86;
}
:root[data-theme="light"] {
  --bg-primary: #f0f3fa;
  --bg-secondary: #ffffff;
  --bg-tertiary: #e8ecf5;
  --bg-hover: #dde2ef;
  --border: #e0e3eb;
  --border-light: #c5c9d5;
  --text-primary: #131722;
  --text-secondary: #4e5a6e;
  --text-muted: #9498a3;
  --accent: #2962ff;
  --accent-hover: #1e53e5;
  --green: #26a69a;
  --red: #ef5350;
  --orange: #f7a600;
  --shadow: rgba(0,0,0,0.15);
  --chart-bg: #ffffff;
  --chart-grid: #f0f3fa;
  --chart-text: #787b86;
}

* { margin: 0; padding: 0; box-sizing: border-box; }

html { height: 100%; }

body {
  font-family: -apple-system, BlinkMacSystemFont, 'Trebuchet MS', 'Segoe UI', sans-serif;
  background: var(--bg-primary);
  color: var(--text-primary);
  height: 100%;
  display: flex;
  flex-direction: column;
  overflow: hidden;
  font-size: 13px;
  user-select: none;
}

/* ── TOPBAR ── */
.topbar {
  height: 48px;
  background: var(--bg-secondary);
  border-bottom: 1px solid var(--border);
  display: flex;
  align-items: center;
  padding: 0 10px;
  gap: 4px;
  flex-shrink: 0;
  z-index: 100;
}
.logo {
  display: flex;
  align-items: center;
  gap: 7px;
  font-weight: 800;
  font-size: 15px;
  color: var(--accent);
  margin-right: 10px;
  letter-spacing: -0.3px;
}
.logo-icon {
  width: 28px; height: 28px;
  background: var(--accent);
  border-radius: 6px;
  display: flex; align-items: center; justify-content: center;
  color: white; font-weight: 900; font-size: 13px;
}
.tb-sep { width: 1px; height: 22px; background: var(--border); margin: 0 6px; }
.tb-group { display: flex; gap: 2px; }

.btn {
  display: flex; align-items: center; gap: 4px;
  padding: 5px 8px;
  border: none; border-radius: 4px;
  cursor: pointer; font-size: 12px; font-weight: 500;
  transition: background 0.12s, color 0.12s;
  background: transparent; color: var(--text-secondary);
  white-space: nowrap;
}
.btn:hover { background: var(--bg-tertiary); color: var(--text-primary); }
.btn.active { background: var(--accent); color: #fff; }
.btn.icon-btn { width: 32px; height: 32px; padding: 0; justify-content: center; }
.btn svg { width: 15px; height: 15px; flex-shrink: 0; }

.spacer { flex: 1; }

/* ── MAIN CONTAINER ── */
.main-container { display: flex; flex: 1; overflow: hidden; min-height: 0; }

/* ── LEFT PANEL (Indicators) ── */
.left-panel {
  width: 220px;
  background: var(--bg-secondary);
  border-right: 1px solid var(--border);
  display: flex; flex-direction: column;
  overflow: hidden; flex-shrink: 0;
  transition: width 0.2s;
}
.left-panel.collapsed { width: 0; }

.panel-section-header {
  padding: 10px 12px 8px;
  font-size: 10px; font-weight: 700;
  text-transform: uppercase; letter-spacing: 0.8px;
  color: var(--text-muted);
  border-bottom: 1px solid var(--border);
  display: flex; align-items: center; gap: 6px;
}
.ind-search {
  padding: 8px;
  border-bottom: 1px solid var(--border);
}
.ind-search input {
  width: 100%; padding: 6px 8px;
  background: var(--bg-tertiary);
  border: 1px solid var(--border); border-radius: 4px;
  color: var(--text-primary); font-size: 12px; outline: none;
}
.ind-search input:focus { border-color: var(--accent); }
.ind-search input::placeholder { color: var(--text-muted); }

.indicators-list { overflow-y: auto; flex: 1; padding: 4px 0; }
.indicators-list::-webkit-scrollbar { width: 3px; }
.indicators-list::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

.ind-group-label {
  padding: 8px 12px 4px;
  font-size: 9px; font-weight: 700;
  text-transform: uppercase; letter-spacing: 0.8px;
  color: var(--text-muted);
}
.ind-item {
  display: flex; align-items: center;
  padding: 6px 12px; cursor: pointer;
  transition: background 0.1s; border-radius: 3px; margin: 1px 6px;
}
.ind-item:hover { background: var(--bg-tertiary); }
.ind-dot { width: 8px; height: 8px; border-radius: 50%; margin-right: 8px; flex-shrink: 0; }
.ind-label { flex: 1; font-size: 12px; color: var(--text-primary); }
.ind-abbr {
  font-size: 9px; padding: 1px 4px; border-radius: 2px;
  background: var(--bg-tertiary); color: var(--text-muted); font-weight: 600;
}

/* ── CHARTS AREA ── */
.charts-area {
  flex: 1; display: grid; gap: 1px;
  background: var(--border);
  overflow: auto;          /* scrollbars when panels overflow */
  min-height: 0;
}
.charts-area.l1  { grid-template-columns: 1fr;    grid-template-rows: 1fr;    min-height: 100%; }
.charts-area.l2h { grid-template-columns: repeat(2, minmax(380px, 1fr)); grid-template-rows: 1fr; min-height: 100%; }
.charts-area.l2v { grid-template-columns: 1fr;    grid-template-rows: repeat(2, minmax(300px, 1fr)); }
.charts-area.l4  { grid-template-columns: repeat(2, minmax(380px, 1fr)); grid-template-rows: repeat(2, minmax(300px, 1fr)); }

/* ── CHART PANEL ── */
.chart-panel {
  background: var(--bg-primary);
  display: flex; flex-direction: column;
  overflow: hidden; position: relative;
  min-height: 300px; min-width: 320px;
}
.chart-panel.is-active::after {
  content: '';
  position: absolute; inset: 0;
  border: 2px solid var(--accent);
  pointer-events: none; z-index: 10;
}

.panel-bar {
  height: 36px;
  display: flex; align-items: center;
  padding: 0 8px; gap: 6px;
  background: var(--bg-secondary);
  border-bottom: 1px solid var(--border);
  flex-shrink: 0; overflow: hidden;
}
.panel-sym {
  display: flex; align-items: center; gap: 5px;
  cursor: pointer; padding: 3px 5px; border-radius: 4px;
  transition: background 0.1s;
}
.panel-sym:hover { background: var(--bg-tertiary); }
.sym-name { font-weight: 700; font-size: 14px; }
.sym-badge {
  font-size: 9px; padding: 1px 4px; border-radius: 2px;
  background: var(--bg-tertiary); color: var(--text-muted);
}
.panel-ohlcv {
  display: flex; gap: 8px; font-size: 11px;
  flex-shrink: 0;
}
.panel-ohlcv .lbl { color: var(--text-muted); }
.oh { color: var(--green) !important; }
.ol { color: var(--red) !important; }
.oc { color: var(--text-primary) !important; }
.pct-up { color: var(--green); }
.pct-dn { color: var(--red); }

.panel-tf {
  display: flex; gap: 1px;
}
.tf-btn {
  padding: 2px 5px; border-radius: 3px;
  font-size: 11px; font-weight: 500;
  cursor: pointer; border: none;
  background: transparent; color: var(--text-muted);
  transition: all 0.1s;
}
.tf-btn:hover { background: var(--bg-tertiary); color: var(--text-primary); }
.tf-btn.active { background: var(--accent); color: #fff; }

.active-inds {
  display: flex; gap: 3px; flex: 1; overflow: hidden; flex-wrap: nowrap;
}
.ind-chip {
  display: flex; align-items: center; gap: 3px;
  padding: 2px 6px; border-radius: 3px;
  font-size: 10px; cursor: pointer;
  white-space: nowrap; flex-shrink: 0;
  border: 1px solid transparent;
}
.ind-chip:hover { opacity: 0.75; }
.ind-chip .chip-x { opacity: 0.6; margin-left: 1px; font-size: 10px; }
.ind-chip .chip-x:hover { opacity: 1; }

.panel-ctrl { display: flex; gap: 1px; margin-left: auto; flex-shrink: 0; }
.panel-ctrl-btn {
  width: 22px; height: 22px;
  display: flex; align-items: center; justify-content: center;
  border: none; background: transparent; cursor: pointer;
  border-radius: 3px; color: var(--text-muted); font-size: 12px;
  transition: background 0.1s, color 0.1s;
}
.panel-ctrl-btn:hover { background: var(--bg-tertiary); color: var(--text-primary); }

.chart-body {
  flex: 1; display: flex; flex-direction: column;
  min-height: 0; overflow: hidden; position: relative;
}
.main-chart-div {
  flex: 1; min-height: 0; position: relative;
  /* Force at least some height so LightweightCharts can measure */
  min-height: 200px;
}
.main-chart-div > div { width: 100% !important; height: 100% !important; }
.watermark {
  position: absolute; bottom: 50px; left: 50%;
  transform: translateX(-50%);
  font-size: 42px; font-weight: 900;
  color: var(--text-muted); opacity: 0.05;
  pointer-events: none; white-space: nowrap;
  letter-spacing: -2px;
}
.sub-chart-wrap {
  height: 130px; flex-shrink: 0;
  border-top: 1px solid var(--border);
  position: relative;
}
.sub-chart-label {
  position: absolute; top: 4px; left: 8px;
  font-size: 10px; color: var(--text-secondary);
  z-index: 5; pointer-events: none;
}
.sub-chart-close {
  position: absolute; top: 3px; right: 4px;
  width: 16px; height: 16px;
  display: flex; align-items: center; justify-content: center;
  font-size: 10px; cursor: pointer;
  color: var(--text-muted); z-index: 5;
  border-radius: 2px;
}
.sub-chart-close:hover { background: var(--bg-tertiary); color: var(--text-primary); }

.loading-overlay {
  position: absolute; inset: 0;
  display: flex; align-items: center; justify-content: center;
  background: var(--bg-primary); z-index: 20;
  gap: 8px; font-size: 12px; color: var(--text-muted);
}
.spinner {
  width: 16px; height: 16px;
  border: 2px solid var(--border);
  border-top-color: var(--accent);
  border-radius: 50%;
  animation: spin 0.7s linear infinite;
}
@keyframes spin { to { transform: rotate(360deg); } }

/* ── RIGHT PANEL (Symbol Selector) ── */
.right-panel {
  width: 310px;
  background: var(--bg-secondary);
  border-left: 1px solid var(--border);
  display: flex; flex-direction: column;
  overflow: hidden; flex-shrink: 0;
  transition: width 0.2s;
}
.right-panel.collapsed { width: 0; }

.sym-search-wrap {
  padding: 8px;
  border-bottom: 1px solid var(--border);
  display: flex; align-items: center; gap: 5px;
  flex-shrink: 0;
}
.sym-search-wrap input {
  flex: 1; padding: 6px 8px;
  background: var(--bg-tertiary);
  border: 1px solid var(--border); border-radius: 4px;
  color: var(--text-primary); font-size: 12px; outline: none;
}
.sym-search-wrap input:focus { border-color: var(--accent); }
.sym-search-wrap input::placeholder { color: var(--text-muted); }

.wl-tabs-wrap {
  display: flex; align-items: center;
  border-bottom: 1px solid var(--border);
  overflow-x: auto; flex-shrink: 0;
}
.wl-tabs-wrap::-webkit-scrollbar { height: 0; }
.wl-tab {
  padding: 8px 10px; font-size: 11px; font-weight: 500;
  cursor: pointer; white-space: nowrap;
  color: var(--text-secondary);
  border-bottom: 2px solid transparent;
  transition: all 0.12s; flex-shrink: 0;
}
.wl-tab:hover { color: var(--text-primary); }
.wl-tab.active { color: var(--accent); border-bottom-color: var(--accent); }
.wl-add-btn {
  padding: 8px; color: var(--text-muted);
  cursor: pointer; font-size: 14px; flex-shrink: 0;
  transition: color 0.12s;
}
.wl-add-btn:hover { color: var(--accent); }

/* Watchlist column header */
.wl-col-header {
  display: grid;
  grid-template-columns: 1fr 72px 64px 56px 26px;
  align-items: center;
  padding: 5px 10px 4px;
  border-bottom: 1px solid var(--border);
  flex-shrink: 0;
  background: var(--bg-tertiary);
}
.wlch {
  font-size: 10px; font-weight: 700;
  text-transform: uppercase; letter-spacing: 0.5px;
  color: var(--text-muted); cursor: pointer;
  display: flex; align-items: center; gap: 3px;
  user-select: none; transition: color 0.12s;
}
.wlch:hover { color: var(--text-primary); }
.wlch.sort-asc::after  { content: ' ▲'; font-size: 8px; color: var(--accent); }
.wlch.sort-desc::after { content: ' ▼'; font-size: 8px; color: var(--accent); }
.wlch.right { justify-content: flex-end; }

.sym-list {
  flex: 1; overflow-y: auto;
}
.sym-list::-webkit-scrollbar { width: 3px; }
.sym-list::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

.sym-item {
  display: grid;
  grid-template-columns: 1fr 72px 64px 56px 26px;
  align-items: center;
  padding: 6px 10px; cursor: pointer;
  transition: background 0.1s;
  border-bottom: 1px solid transparent;
}
.sym-item:hover { background: var(--bg-tertiary); }
.sym-item.active { background: rgba(41,98,255,0.1); }
.sym-item:hover .sym-del-btn { opacity: 1; }

.sym-icon {
  width: 24px; height: 24px; border-radius: 50%;
  background: var(--bg-tertiary);
  display: flex; align-items: center; justify-content: center;
  font-size: 9px; font-weight: 800;
  margin-right: 6px; flex-shrink: 0;
  color: var(--accent);
}
.sym-cell-name { display: flex; align-items: center; min-width: 0; }
.sym-info { flex: 1; min-width: 0; }
.sym-ticker { font-weight: 700; font-size: 11px; }
.sym-name-full { font-size: 9px; color: var(--text-muted); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

.sym-cell-price { font-size: 11px; font-weight: 600; text-align: right; }
.sym-cell-chgval { font-size: 10px; text-align: right; }
.sym-cell-chgpct { font-size: 10px; text-align: right; font-weight: 600; }
.sym-cell-chgval.up, .sym-cell-chgpct.up { color: var(--green); }
.sym-cell-chgval.dn, .sym-cell-chgpct.dn { color: var(--red); }

/* Alias for backwards-compat with updateSymbolPrice */
.sym-price { font-size: 11px; font-weight: 600; }
.sym-chg   { font-size: 10px; }
.sym-chg.up { color: var(--green); }
.sym-chg.dn { color: var(--red); }

.sym-del-btn {
  width: 20px; height: 20px;
  display: flex; align-items: center; justify-content: center;
  border-radius: 3px; font-size: 13px;
  color: var(--text-muted); opacity: 0;
  transition: all 0.1s; flex-shrink: 0;
}
.sym-del-btn:hover { background: rgba(239,83,80,0.15); color: var(--red); opacity: 1 !important; }

.wl-footer {
  border-top: 1px solid var(--border);
  padding: 8px 10px;
  display: flex; align-items: center; gap: 6px;
  flex-shrink: 0;
}
.wl-footer-btn {
  flex: 1; padding: 6px; border-radius: 4px;
  border: 1px solid var(--border); background: transparent;
  color: var(--text-secondary); font-size: 11px; cursor: pointer;
  display: flex; align-items: center; justify-content: center; gap: 4px;
  transition: all 0.1s;
}
.wl-footer-btn:hover { background: var(--bg-tertiary); color: var(--text-primary); }
.wl-footer-btn.danger:hover { background: rgba(239,83,80,0.1); color: var(--red); border-color: var(--red); }

/* ── MODAL ── */
.modal-overlay {
  position: fixed; inset: 0;
  background: rgba(0,0,0,0.55);
  z-index: 500;
  display: flex; align-items: center; justify-content: center;
}
.modal {
  background: var(--bg-secondary);
  border: 1px solid var(--border-light);
  border-radius: 8px; padding: 20px;
  width: 360px; max-width: 90vw;
  box-shadow: 0 8px 40px var(--shadow);
}
.modal-title {
  font-size: 14px; font-weight: 700;
  margin-bottom: 16px; color: var(--text-primary);
}
.modal-field { margin-bottom: 12px; }
.modal-field label {
  display: block; font-size: 11px;
  color: var(--text-secondary); margin-bottom: 4px;
}
.modal-field input, .modal-field select {
  width: 100%; padding: 7px 10px;
  background: var(--bg-tertiary);
  border: 1px solid var(--border); border-radius: 4px;
  color: var(--text-primary); font-size: 12px; outline: none;
}
.modal-field input:focus, .modal-field select:focus { border-color: var(--accent); }
.modal-actions {
  display: flex; gap: 8px; justify-content: flex-end;
  margin-top: 16px;
}
.modal-btn {
  padding: 7px 14px; border-radius: 4px;
  font-size: 12px; font-weight: 500; cursor: pointer;
  border: 1px solid var(--border);
  background: var(--bg-tertiary); color: var(--text-primary);
  transition: background 0.1s;
}
.modal-btn:hover { background: var(--bg-hover); }
.modal-btn.primary {
  background: var(--accent); border-color: var(--accent); color: #fff;
}
.modal-btn.primary:hover { background: var(--accent-hover); }

/* ── LAYOUT ITEMS (save/load modal) ── */
.layout-list { max-height: 320px; overflow-y: auto; margin-bottom: 4px; }
.layout-item {
  display: flex; align-items: center; gap: 8px;
  padding: 9px 10px; border-radius: 5px;
  border: 1px solid var(--border);
  margin-bottom: 6px;
  background: var(--bg-tertiary);
}
.layout-item-info { flex: 1; min-width: 0; }
.layout-item-name { font-size: 12px; font-weight: 700; color: var(--text-primary); margin-bottom: 2px; }
.layout-item-meta { font-size: 10px; color: var(--text-muted); }
.layout-item-actions { display: flex; gap: 4px; flex-shrink: 0; }
.layout-item-btn {
  padding: 4px 10px; border-radius: 3px;
  font-size: 11px; cursor: pointer;
  border: 1px solid var(--border);
  background: var(--bg-secondary); color: var(--text-secondary);
  transition: all 0.1s;
}
.layout-item-btn:hover { background: var(--bg-hover); color: var(--text-primary); }
.layout-item-btn.danger:hover { background: rgba(239,83,80,0.1); color: var(--red); border-color: var(--red); }

/* ── CONTEXT MENU ── */
.ctx-menu {
  position: fixed;
  background: var(--bg-secondary);
  border: 1px solid var(--border-light);
  border-radius: 6px; padding: 4px;
  z-index: 600; min-width: 160px;
  box-shadow: 0 4px 20px var(--shadow);
}
.ctx-item {
  padding: 7px 12px; border-radius: 3px;
  cursor: pointer; font-size: 12px; color: var(--text-primary);
  transition: background 0.1s;
}
.ctx-item:hover { background: var(--bg-tertiary); }
.ctx-item.danger { color: var(--red); }
.ctx-sep { height: 1px; background: var(--border); margin: 3px 0; }

/* ── TOAST ── */
.toast {
  position: fixed; bottom: 20px; left: 50%;
  transform: translateX(-50%);
  background: var(--bg-tertiary);
  border: 1px solid var(--border-light);
  border-radius: 6px; padding: 8px 16px;
  font-size: 12px; z-index: 1000;
  opacity: 0; transition: opacity 0.25s;
  pointer-events: none; color: var(--text-primary);
  box-shadow: 0 4px 12px var(--shadow);
}
.toast.show { opacity: 1; }

/* ── SCROLLBAR GLOBAL ── */
::-webkit-scrollbar { width: 4px; height: 4px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

/* ── PANEL SPLITTER ── */
.panel-splitter {
  width: 4px; flex-shrink: 0;
  background: var(--border);
  cursor: col-resize;
  transition: background 0.15s;
  position: relative; z-index: 10;
}
.panel-splitter:hover, .panel-splitter.dragging { background: var(--accent); }

/* ── RIGHT PANEL TABS ── */
.right-tab-strip {
  display: flex; border-bottom: 1px solid var(--border);
  flex-shrink: 0; background: var(--bg-secondary);
}
.right-tab {
  flex: 1; padding: 8px 4px; font-size: 11px; font-weight: 600;
  cursor: pointer; border: none; background: transparent;
  color: var(--text-muted); border-bottom: 2px solid transparent;
  transition: all 0.12s; white-space: nowrap;
}
.right-tab:hover { color: var(--text-primary); background: var(--bg-tertiary); }
.right-tab.active { color: var(--accent); border-bottom-color: var(--accent); background: transparent; }
.right-tab-content { display: none; flex-direction: column; flex: 1; overflow: hidden; min-height: 0; }
.right-tab-content.active { display: flex; }

/* ── ORDER BOOK ── */
.ob-header {
  padding: 7px 10px 5px; font-size: 10px; font-weight: 700;
  text-transform: uppercase; letter-spacing: 0.7px; color: var(--text-muted);
  border-bottom: 1px solid var(--border); display: flex; justify-content: space-between;
  flex-shrink: 0;
}
.ob-col-header {
  display: grid; grid-template-columns: 1fr 1fr 1fr;
  padding: 4px 10px; background: var(--bg-tertiary);
  border-bottom: 1px solid var(--border); flex-shrink: 0;
}
.ob-col-header span { font-size: 9px; font-weight: 700; text-transform: uppercase; color: var(--text-muted); }
.ob-col-header span:nth-child(2), .ob-col-header span:nth-child(3) { text-align: right; }
.ob-section { flex: 1; overflow-y: auto; min-height: 0; }
.ob-row {
  display: grid; grid-template-columns: 1fr 1fr 1fr;
  padding: 2px 10px; font-size: 10.5px; position: relative; cursor: default;
}
.ob-row .ob-bar {
  position: absolute; right: 0; top: 0; bottom: 0; opacity: 0.12;
  pointer-events: none;
}
.ob-row.ask .ob-bar { background: var(--red); }
.ob-row.bid .ob-bar { background: var(--green); }
.ob-row .ob-price { font-weight: 600; }
.ob-row.ask .ob-price { color: var(--red); }
.ob-row.bid .ob-price { color: var(--green); }
.ob-row .ob-qty, .ob-row .ob-total { text-align: right; color: var(--text-secondary); font-size: 10px; }
.ob-spread {
  display: flex; align-items: center; justify-content: space-between;
  padding: 4px 10px; background: var(--bg-tertiary);
  border-top: 1px solid var(--border); border-bottom: 1px solid var(--border);
  font-size: 11px; flex-shrink: 0;
}
.ob-spread-price { font-weight: 700; font-size: 13px; }
.ob-spread-pct { font-size: 10px; color: var(--text-muted); }

/* ── TECH INFO ── */
.ti-section { padding: 10px; border-bottom: 1px solid var(--border); }
.ti-section:last-child { border-bottom: none; }
.ti-section-title {
  font-size: 9px; font-weight: 700; text-transform: uppercase;
  letter-spacing: 0.8px; color: var(--text-muted); margin-bottom: 8px;
}
.ti-row {
  display: flex; justify-content: space-between; align-items: center;
  padding: 2px 0; font-size: 11px;
}
.ti-label { color: var(--text-muted); }
.ti-value { font-weight: 600; color: var(--text-primary); }
.ti-value.up { color: var(--green); }
.ti-value.dn { color: var(--red); }
.ti-price-big {
  font-size: 22px; font-weight: 800; padding: 10px;
  border-bottom: 1px solid var(--border); display: flex;
  align-items: baseline; gap: 8px; flex-shrink: 0;
}
.ti-price-chg { font-size: 12px; font-weight: 600; }
.ti-sparkline { padding: 4px 10px 8px; flex-shrink: 0; }
.ti-sparkline canvas { width: 100%; height: 50px; }

/* ── ALERTS OVERLAY ── */
.alerts-overlay {
  position: fixed; right: 0; top: 48px; bottom: 0;
  width: 320px; background: var(--bg-secondary);
  border-left: 1px solid var(--border);
  z-index: 200; display: flex; flex-direction: column;
  box-shadow: -4px 0 20px var(--shadow);
  transform: translateX(100%); transition: transform 0.2s;
}
.alerts-overlay.open { transform: translateX(0); }
.alerts-header {
  padding: 12px 14px; border-bottom: 1px solid var(--border);
  display: flex; align-items: center; justify-content: space-between;
  flex-shrink: 0;
}
.alerts-header-title { font-size: 13px; font-weight: 700; }
.alerts-list { flex: 1; overflow-y: auto; }
.alert-item {
  display: flex; align-items: center; gap: 8px;
  padding: 8px 12px; border-bottom: 1px solid var(--border);
  transition: background 0.1s;
}
.alert-item:hover { background: var(--bg-tertiary); }
.alert-item.triggered { opacity: 0.55; }
.alert-dot {
  width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0;
}
.alert-dot.active { background: var(--orange); }
.alert-dot.triggered { background: var(--text-muted); }
.alert-info { flex: 1; min-width: 0; }
.alert-sym { font-size: 11px; font-weight: 700; }
.alert-cond { font-size: 10px; color: var(--text-muted); }
.alert-del { width: 20px; height: 20px; display: flex; align-items: center; justify-content: center;
  border-radius: 3px; cursor: pointer; color: var(--text-muted); font-size: 13px; opacity: 0; }
.alert-item:hover .alert-del { opacity: 1; }
.alert-del:hover { background: rgba(239,83,80,0.15); color: var(--red); }
.alerts-empty { padding: 30px 14px; text-align: center; color: var(--text-muted); font-size: 12px; }
.alerts-footer { padding: 10px; border-top: 1px solid var(--border); flex-shrink: 0; }
.alert-add-btn {
  width: 100%; padding: 7px; border-radius: 4px;
  border: 1px solid var(--border); background: transparent;
  color: var(--text-secondary); font-size: 11px; cursor: pointer;
  display: flex; align-items: center; justify-content: center; gap: 5px;
  transition: all 0.1s;
}
.alert-add-btn:hover { background: var(--bg-tertiary); color: var(--text-primary); }
.alerts-badge {
  position: absolute; top: 3px; right: 3px;
  width: 15px; height: 15px; border-radius: 50%;
  background: var(--orange); color: #fff;
  font-size: 9px; font-weight: 800;
  display: flex; align-items: center; justify-content: center;
  pointer-events: none;
}

/* ── SETTINGS OVERLAY ── */
.settings-overlay {
  position: fixed; inset: 0;
  background: var(--bg-primary); z-index: 400;
  display: flex; flex-direction: column;
  transform: translateY(-100%); transition: transform 0.25s ease;
}
.settings-overlay.open { transform: translateY(0); }
.settings-topbar {
  height: 48px; background: var(--bg-secondary);
  border-bottom: 1px solid var(--border);
  display: flex; align-items: center; padding: 0 16px; gap: 12px; flex-shrink: 0;
}
.settings-topbar-title { font-size: 15px; font-weight: 700; flex: 1; }
.settings-body { flex: 1; overflow-y: auto; padding: 20px; max-width: 700px; margin: 0 auto; width: 100%; }
.settings-section { margin-bottom: 28px; }
.settings-section-title {
  font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.8px;
  color: var(--text-muted); margin-bottom: 12px; padding-bottom: 6px;
  border-bottom: 1px solid var(--border);
}
.settings-row {
  display: flex; align-items: center; justify-content: space-between;
  padding: 10px 0; border-bottom: 1px solid var(--border);
}
.settings-row:last-child { border-bottom: none; }
.settings-row-label { font-size: 13px; }
.settings-row-desc { font-size: 11px; color: var(--text-muted); margin-top: 2px; }
.settings-select {
  padding: 6px 10px; border-radius: 4px;
  border: 1px solid var(--border); background: var(--bg-tertiary);
  color: var(--text-primary); font-size: 12px; outline: none; cursor: pointer;
  min-width: 140px;
}
.settings-select:focus { border-color: var(--accent); }
.exchange-card-grid {
  display: grid; grid-template-columns: repeat(auto-fill, minmax(120px, 1fr)); gap: 8px;
}
.exchange-card {
  padding: 10px; border-radius: 6px;
  border: 2px solid var(--border); background: var(--bg-tertiary);
  cursor: pointer; text-align: center; transition: all 0.12s;
}
.exchange-card:hover { border-color: var(--accent); }
.exchange-card.active { border-color: var(--accent); background: rgba(41,98,255,0.1); }
.exchange-card-name { font-size: 12px; font-weight: 700; margin-bottom: 3px; }
.exchange-card-status { font-size: 10px; color: var(--text-muted); }
.exchange-card.active .exchange-card-status { color: var(--accent); }

/* ── SYMBOL SEARCH DROPDOWN ── */
.sym-search-results {
  position: absolute; top: 100%; left: 0; right: 0; z-index: 100;
  background: var(--bg-secondary); border: 1px solid var(--border-light);
  border-top: none; border-radius: 0 0 6px 6px;
  max-height: 260px; overflow-y: auto;
  box-shadow: 0 8px 24px var(--shadow);
}
.sym-search-result {
  display: flex; align-items: center; gap: 8px;
  padding: 7px 10px; cursor: pointer; transition: background 0.1s;
  font-size: 12px;
}
.sym-search-result:hover { background: var(--bg-tertiary); }
.sym-search-result .ssr-ticker { font-weight: 700; }
.sym-search-result .ssr-name { color: var(--text-muted); font-size: 10px; }
.sym-search-result .ssr-add { margin-left: auto; font-size: 10px; color: var(--accent); opacity: 0; }
.sym-search-result:hover .ssr-add { opacity: 1; }
.sym-search-wrap { position: relative; }

/* ── ALERT INDICATOR on hline ── */
.alert-hline-trigger { cursor: pointer; }

/* ── TOPBAR ALERT / SETTINGS BTNS ── */
.tb-notif-wrap { position: relative; }

/* ── DRAWINGS EXPORT TOOLBAR BTN ── */
.dtool-file { display: none; }

/* ── Volume Profile SVG overlay ── */
.vp-overlay {
  position: absolute; left: 0; top: 0; bottom: 0;
  width: 70px; pointer-events: none; z-index: 4;
  opacity: 0.7;
}

/* ── DRAWING TOOLBAR ── */
.drawing-toolbar {
  width: 44px;
  background: var(--bg-secondary);
  border-right: 1px solid var(--border);
  display: flex; flex-direction: column;
  align-items: center;
  padding: 6px 4px 8px;
  gap: 2px; flex-shrink: 0;
  overflow-y: auto; overflow-x: hidden;
  z-index: 50;
}
.drawing-toolbar::-webkit-scrollbar { width: 0; }

.dtool-btn {
  width: 32px; height: 32px;
  display: flex; align-items: center; justify-content: center;
  border-radius: 4px; cursor: pointer;
  color: var(--text-muted); transition: all 0.12s; flex-shrink: 0;
}
.dtool-btn svg { width: 16px; height: 16px; }
.dtool-btn:hover { background: var(--bg-tertiary); color: var(--text-primary); }
.dtool-btn.active { background: var(--accent); color: #fff; }
.dtool-sep { width: 26px; height: 1px; background: var(--border); margin: 3px 0; flex-shrink: 0; }
.dtool-color {
  width: 24px; height: 24px; border-radius: 50%;
  border: 2px solid var(--border); cursor: pointer;
  padding: 0; overflow: hidden; flex-shrink: 0;
}
.dtool-color input[type="color"] {
  width: 32px; height: 32px;
  margin: -4px; cursor: pointer; border: none; outline: none;
}

/* ── SVG DRAWING OVERLAY ── */
.drawing-overlay {
  position: absolute; inset: 0;
  pointer-events: none; z-index: 5;
  width: 100%; height: 100%;
  overflow: hidden;
}
.drawing-overlay.draw-active {
  pointer-events: all; cursor: crosshair;
}
.draw-handle {
  cursor: move;
}
.draw-eraser-active .drawing-overlay {
  pointer-events: all; cursor: url("data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' width='20' height='20'><circle cx='10' cy='10' r='8' fill='none' stroke='%23ef5350' stroke-width='2'/></svg>") 10 10, crosshair;
}
</style>
</head>
<body>

<div id="app">

  <!-- TOPBAR -->
  <div class="topbar">
    <div class="logo">
      <div class="logo-icon">C</div>
      CryptoPro
    </div>

    <div class="tb-sep"></div>

    <!-- Panel toggle buttons -->
    <button class="btn icon-btn" id="btnToggleLeft" title="Toggle Indicators Panel">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="18" rx="1"/><path d="M14 3h7M14 8h7M14 13h7M14 18h7"/></svg>
    </button>

    <div class="tb-sep"></div>

    <!-- Layout buttons -->
    <div class="tb-group" id="layoutBtns">
      <button class="btn icon-btn active" data-layout="l1" title="Single Chart">
        <svg viewBox="0 0 20 20" fill="currentColor"><rect x="2" y="2" width="16" height="16" rx="1"/></svg>
      </button>
      <button class="btn icon-btn" data-layout="l2h" title="2 Side by Side">
        <svg viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="2" y="2" width="7" height="16" rx="0.5"/><rect x="11" y="2" width="7" height="16" rx="0.5"/></svg>
      </button>
      <button class="btn icon-btn" data-layout="l2v" title="2 Stacked">
        <svg viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="2" y="2" width="16" height="7" rx="0.5"/><rect x="2" y="11" width="16" height="7" rx="0.5"/></svg>
      </button>
      <button class="btn icon-btn" data-layout="l4" title="4 Charts">
        <svg viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="2" y="2" width="7" height="7" rx="0.5"/><rect x="11" y="2" width="7" height="7" rx="0.5"/><rect x="2" y="11" width="7" height="7" rx="0.5"/><rect x="11" y="11" width="7" height="7" rx="0.5"/></svg>
      </button>
    </div>

    <div class="tb-sep"></div>

    <!-- Global timeframe (applies to active panel) -->
    <div class="tb-group" id="globalTfBtns">
      <button class="btn tf-btn" data-tf="1m">1m</button>
      <button class="btn tf-btn" data-tf="5m">5m</button>
      <button class="btn tf-btn" data-tf="15m">15m</button>
      <button class="btn tf-btn" data-tf="30m">30m</button>
      <button class="btn tf-btn active" data-tf="1h">1H</button>
      <button class="btn tf-btn" data-tf="4h">4H</button>
      <button class="btn tf-btn" data-tf="1d">1D</button>
      <button class="btn tf-btn" data-tf="1w">1W</button>
    </div>

    <div class="tb-sep"></div>

    <!-- Save layout / Layouts manager -->
    <button class="btn" id="btnSaveLayout" title="Save current layout (Ctrl+S)" style="padding:5px 10px;gap:5px">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="14" height="14"><path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2z"/><polyline points="17 21 17 13 7 13 7 21"/><polyline points="7 3 7 8 15 8"/></svg>
      Save
    </button>
    <button class="btn" id="btnLayouts" title="Manage saved layouts" style="padding:5px 10px;gap:5px">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="14" height="14"><path d="M22 19a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5l2 3h9a2 2 0 0 1 2 2z"/></svg>
      Layouts
    </button>

    <div class="spacer"></div>

    <!-- Theme toggle -->
    <button class="btn icon-btn" id="btnTheme" title="Toggle Theme">
      <svg id="themeIconDark" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>
      <svg id="themeIconLight" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="display:none"><circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/></svg>
    </button>

    <!-- Alerts -->
    <div class="tb-notif-wrap">
      <button class="btn icon-btn" id="btnAlerts" title="Price Alerts">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.73 21a2 2 0 0 1-3.46 0"/></svg>
      </button>
      <div class="alerts-badge" id="alertsBadge" style="display:none">0</div>
    </div>

    <!-- Settings -->
    <button class="btn icon-btn" id="btnSettings" title="Settings">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>
    </button>

    <div class="tb-sep"></div>

    <!-- Right panel toggle -->
    <button class="btn icon-btn" id="btnToggleRight" title="Toggle Symbol Panel">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="14" y="3" width="7" height="18" rx="1"/><path d="M3 3h7M3 8h7M3 13h7M3 18h7"/></svg>
    </button>
  </div>

  <!-- MAIN -->
  <div class="main-container">

    <!-- LEFT: Indicators -->
    <div class="left-panel" id="leftPanel">
      <div class="panel-section-header">
        <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/></svg>
        Indicators
      </div>
      <div class="ind-search">
        <input type="text" id="indSearch" placeholder="Search indicators...">
      </div>
      <div class="indicators-list" id="indicatorsList"></div>
    </div>

    <!-- DRAWING TOOLBAR (vertical strip) -->
    <div class="drawing-toolbar" id="drawingToolbar"></div>

    <!-- CENTER: Charts -->
    <div class="charts-area l1" id="chartsArea"></div>

    <!-- RIGHT SPLITTER -->
    <div class="panel-splitter" id="splitterRight"></div>

    <!-- RIGHT: Symbol Selector + Order Book + Tech Info -->
    <div class="right-panel" id="rightPanel">
      <!-- Tab strip -->
      <div class="right-tab-strip" id="rightTabStrip">
        <button class="right-tab active" data-rtab="watchlist">Watchlist</button>
        <button class="right-tab" data-rtab="orderbook">Order Book</button>
        <button class="right-tab" data-rtab="techinfo">Tech Info</button>
      </div>

      <!-- WATCHLIST TAB -->
      <div class="right-tab-content active" id="rtabWatchlist">
        <div class="sym-search-wrap">
          <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
          <input type="text" id="symSearch" placeholder="Search all crypto pairs...">
          <div class="sym-search-results" id="symSearchResults" style="display:none"></div>
        </div>
        <div class="wl-tabs-wrap" id="wlTabs"></div>
        <div class="wl-col-header" id="wlColHeader">
          <div class="wlch" data-sort="name">Symbol</div>
          <div class="wlch right" data-sort="price">Price</div>
          <div class="wlch right" data-sort="chgval">Chg $</div>
          <div class="wlch right" data-sort="chgpct">Chg %</div>
          <div></div>
        </div>
        <div class="sym-list" id="symList"></div>
        <div class="wl-footer">
          <button class="wl-footer-btn" id="btnAddWatchlist">+ New Watchlist</button>
          <button class="wl-footer-btn" id="btnAddSymbol">+ Add Symbol</button>
        </div>
      </div>

      <!-- ORDER BOOK TAB -->
      <div class="right-tab-content" id="rtabOrderbook">
        <div class="ob-header">
          <span>Order Book</span>
          <span id="obSymLabel" style="color:var(--text-secondary)">—</span>
        </div>
        <div class="ob-col-header">
          <span>Price</span><span>Size</span><span>Total</span>
        </div>
        <!-- Asks (shown top-to-bottom, lowest ask at bottom = reversed) -->
        <div class="ob-section" id="obAsks" style="flex:1;display:flex;flex-direction:column-reverse;overflow-y:auto"></div>
        <div class="ob-spread">
          <div>
            <div class="ob-spread-price" id="obMidPrice">—</div>
            <div class="ob-spread-pct" id="obSpreadPct">Spread —</div>
          </div>
          <div style="font-size:10px;color:var(--text-muted)" id="obLastUpdate">—</div>
        </div>
        <div class="ob-section" id="obBids" style="flex:1;overflow-y:auto"></div>
      </div>

      <!-- TECH INFO TAB -->
      <div class="right-tab-content" id="rtabTechinfo" style="overflow-y:auto">
        <div id="tiContent">
          <div style="padding:30px;text-align:center;color:var(--text-muted);font-size:12px">
            Select a chart to view technical information
          </div>
        </div>
      </div>
    </div>
  </div>
</div>

<!-- ALERTS SLIDE-OUT -->
<div class="alerts-overlay" id="alertsOverlay">
  <div class="alerts-header">
    <div class="alerts-header-title">Price Alerts</div>
    <button class="btn icon-btn" id="btnCloseAlerts" title="Close">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
    </button>
  </div>
  <div class="alerts-list" id="alertsList"></div>
  <div class="alerts-footer">
    <button class="alert-add-btn" id="btnAddAlert">
      <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
      Add Alert for Active Symbol
    </button>
  </div>
</div>

<!-- SETTINGS PAGE -->
<div class="settings-overlay" id="settingsOverlay">
  <div class="settings-topbar">
    <button class="btn icon-btn" id="btnCloseSettings">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
    </button>
    <div class="settings-topbar-title">Settings</div>
  </div>
  <div class="settings-body">
    <div class="settings-section">
      <div class="settings-section-title">Data Source</div>
      <div class="exchange-card-grid" id="exchangeCardGrid"></div>

// ============================================================
// INDICATOR CALCULATIONS
// ============================================================

function sma(arr, period) {
  const r = [];
  for (let i = period-1; i < arr.length; i++) {
    let s = 0;
    for (let j = i-period+1; j <= i; j++) s += arr[j].close;
    r.push({ time: arr[i].time, value: s/period });
  }
  return r;
}

function emaArr(closes, period) {
  // Returns array of ema values aligned to closes
  if (closes.length < period) return [];
  const k = 2/(period+1);
  const result = new Array(closes.length).fill(null);
  // Seed with SMA
  let seed = 0;
  for (let i = 0; i < period; i++) seed += closes[i];
  result[period-1] = seed/period;
  for (let i = period; i < closes.length; i++) {
    result[i] = closes[i]*k + result[i-1]*(1-k);
  }
  return result;
}

function calcEMA(data, period) {
  const closes = data.map(d => d.close);
  const vals = emaArr(closes, period);
  const r = [];
  for (let i = period-1; i < data.length; i++) {
    if (vals[i] != null) r.push({ time: data[i].time, value: vals[i] });
  }
  return r;
}

function calcSMA(data, period) { return sma(data, period); }

function calcWMA(data, period) {
  const r = [];
  const denom = (period*(period+1))/2;
  for (let i = period-1; i < data.length; i++) {
    let s = 0;
    for (let j = 0; j < period; j++) s += data[i-j].close * (period-j);
    r.push({ time: data[i].time, value: s/denom });
  }
  return r;
}

function calcBB(data, period, mult) {
  const mid = sma(data, period);
  const upper = [], lower = [];
  for (let i = period-1; i < data.length; i++) {
    const slice = data.slice(i-period+1, i+1).map(d => d.close);
    const m = mid[i-(period-1)].value;
    const variance = slice.reduce((a,b) => a+(b-m)**2, 0)/period;
    const sd = Math.sqrt(variance)*mult;
    upper.push({ time: data[i].time, value: m+sd });
    lower.push({ time: data[i].time, value: m-sd });
  }
  return { mid, upper, lower };
}

function calcVWAP(data) {
  const r = [];
  let cumTV = 0, cumV = 0;
  let lastDay = null;
  for (const d of data) {
    const day = Math.floor(d.time/86400);
    if (lastDay !== null && day !== lastDay) { cumTV = 0; cumV = 0; }
    lastDay = day;
    const tp = (d.high+d.low+d.close)/3;
    cumTV += tp*d.volume;
    cumV += d.volume;
    if (cumV > 0) r.push({ time: d.time, value: cumTV/cumV });
  }
  return r;
}

function calcIchimoku(data, tenkan=9, kijun=26, senkou=52) {
  function midHL(arr, start, len) {
    let hi = -Infinity, lo = Infinity;
    for (let i = start; i < start+len && i < arr.length; i++) {
      if (arr[i].high > hi) hi = arr[i].high;
      if (arr[i].low < lo) lo = arr[i].low;
    }
    return (hi+lo)/2;
  }
  const tenkanLine=[], kijunLine=[], chikouLine=[];
  const senkouA=[], senkouB=[];
  const maxPeriod = Math.max(tenkan, kijun, senkou);
  for (let i = maxPeriod-1; i < data.length; i++) {
    const t = midHL(data, i-tenkan+1, tenkan);
    const k = midHL(data, i-kijun+1, kijun);
    const s = midHL(data, i-senkou+1, senkou);
    tenkanLine.push({ time: data[i].time, value: t });
    kijunLine.push({ time: data[i].time, value: k });
    // Senkou A & B projected forward by kijun periods
    const fwdIdx = i + kijun;
    if (fwdIdx < data.length) {
      senkouA.push({ time: data[fwdIdx].time, value: (t+k)/2 });
      senkouB.push({ time: data[fwdIdx].time, value: s });
    }
    // Chikou: close shifted back kijun bars
    const backIdx = i - kijun;
    if (backIdx >= 0) chikouLine.push({ time: data[backIdx].time, value: data[i].close });
  }
  return { tenkanLine, kijunLine, chikouLine, senkouA, senkouB };
}

function calcPSAR(data, step=0.02, maxAF=0.2) {
  if (data.length < 2) return [];
  const r = [];
  let bull = true;
  let af = step;
  let ep = data[0].high;
  let sar = data[0].low;
  for (let i = 1; i < data.length; i++) {
    const prevSar = sar;
    sar = prevSar + af*(ep-prevSar);
    if (bull) {
      sar = Math.min(sar, data[i-1].low, i>1 ? data[i-2].low : data[i-1].low);
      if (data[i].low < sar) {
        bull=false; sar=ep; af=step; ep=data[i].low;
      } else {
        if (data[i].high > ep) { ep=data[i].high; af=Math.min(af+step, maxAF); }
      }
    } else {
      sar = Math.max(sar, data[i-1].high, i>1 ? data[i-2].high : data[i-1].high);
      if (data[i].high > sar) {
        bull=true; sar=ep; af=step; ep=data[i].high;
      } else {
        if (data[i].low < ep) { ep=data[i].low; af=Math.min(af+step, maxAF); }
      }
    }
    r.push({ time: data[i].time, value: sar });
  }
  return r;
}

function calcDEMA(data, period) {
  const closes = data.map(d => d.close);
  const ema1 = emaArr(closes, period);
  const ema2Vals = emaArr(ema1.filter(v=>v!=null), period);
  const offset = ema1.findIndex(v=>v!=null);
  const offset2 = ema2Vals.findIndex(v=>v!=null);
  const r = [];
  for (let i = period-1; i < data.length; i++) {
    const e1 = ema1[i];
    const e2idx = i - offset - (period-1);
    if (e2idx >= 0 && e2idx < ema2Vals.length && ema2Vals[e2idx] != null) {
      r.push({ time: data[i].time, value: 2*e1 - ema2Vals[e2idx] });
    }
  }
  return r;
}

function calcTEMA(data, period) {
  const closes = data.map(d => d.close);
  const ema1 = emaArr(closes, period);
  const v1 = ema1.filter(v=>v!=null);
  const ema2 = emaArr(v1, period);
  const v2 = ema2.filter(v=>v!=null);
  const ema3 = emaArr(v2, period);
  const off1 = ema1.findIndex(v=>v!=null);
  const off2 = off1 + ema2.findIndex(v=>v!=null);
  const off3 = off2 + ema3.findIndex(v=>v!=null);
  const r = [];
  for (let i = off3; i < data.length; i++) {
    const e1 = ema1[i];
    const e2 = ema2[i-off1];
    const e3 = ema3[i-off2];
    if (e1!=null&&e2!=null&&e3!=null)
      r.push({ time: data[i].time, value: 3*e1-3*e2+e3 });
  }
  return r;
}

function calcPivots(data) {
  // Daily pivots using each bar's OHLC
  // Returns pivot, r1-r3, s1-s3 as separate series
  const pivot=[], r1=[], r2=[], r3=[], s1=[], s2=[], s3=[];
  for (const d of data) {
    const p = (d.high+d.low+d.close)/3;
    pivot.push({ time:d.time, value:p });
    r1.push({ time:d.time, value:2*p-d.low });
    r2.push({ time:d.time, value:p+(d.high-d.low) });
    r3.push({ time:d.time, value:d.high+2*(p-d.low) });
    s1.push({ time:d.time, value:2*p-d.high });
    s2.push({ time:d.time, value:p-(d.high-d.low) });
    s3.push({ time:d.time, value:d.low-2*(d.high-p) });
  }
  return { pivot, r1, r2, r3, s1, s2, s3 };
}

function wilderMA(arr, period) {
  // Wilder's smoothing: k = 1/period
  if (arr.length < period) return [];
  const result = new Array(arr.length).fill(null);
  let seed = 0;
  for (let i = 0; i < period; i++) seed += arr[i];
  result[period-1] = seed/period;
  for (let i = period; i < arr.length; i++) {
    result[i] = result[i-1]*(period-1)/period + arr[i]/period;
  }
  return result;
}

function calcRSI(data, period) {
  const r = [];
  const gains=[], losses=[];
  for (let i = 1; i < data.length; i++) {
    const diff = data[i].close - data[i-1].close;
    gains.push(Math.max(diff, 0));
    losses.push(Math.max(-diff, 0));
  }
  const avgGain = wilderMA(gains, period);
  const avgLoss = wilderMA(losses, period);
  for (let i = period-1; i < gains.length; i++) {
    const ag = avgGain[i], al = avgLoss[i];
    const rsi = al === 0 ? 100 : 100 - 100/(1+ag/al);
    r.push({ time: data[i+1].time, value: rsi });
  }
  return r;
}

function calcMACD(data, fast, slow, sig) {
  const closes = data.map(d => d.close);
  const ema1 = emaArr(closes, fast);
  const ema2 = emaArr(closes, slow);
  const macdVals=[];
  const macdData=[];
  for (let i = slow-1; i < data.length; i++) {
    if (ema1[i]!=null && ema2[i]!=null) {
      const m = ema1[i]-ema2[i];
      macdVals.push(m);
      macdData.push({ time: data[i].time, macd: m });
    }
  }
  const signalVals = emaArr(macdVals, sig);
  const macdLine=[], signalLine=[], hist=[];
  for (let i = 0; i < macdData.length; i++) {
    const sv = signalVals[i];
    if (sv != null) {
      macdLine.push({ time: macdData[i].time, value: macdData[i].macd });
      signalLine.push({ time: macdData[i].time, value: sv });
      const h = macdData[i].macd - sv;
      hist.push({ time: macdData[i].time, value: h, color: h>=0 ? '#26a69a' : '#ef5350' });
    }
  }
  return { macdLine, signalLine, hist };
}

function calcStoch(data, kp, dp) {
  const kVals=[];
  for (let i = kp-1; i < data.length; i++) {
    let hi=-Infinity, lo=Infinity;
    for (let j = i-kp+1; j <= i; j++) {
      if (data[j].high>hi) hi=data[j].high;
      if (data[j].low<lo) lo=data[j].low;
    }
    const k = lo===hi ? 50 : 100*(data[i].close-lo)/(hi-lo);
    kVals.push({ time: data[i].time, value: k });
  }
  const dVals=[];
  const dSMA = sma(kVals, dp);
  return { k: kVals, d: dSMA };
}

function calcATR(data, period) {
  const trs=[];
  for (let i = 1; i < data.length; i++) {
    const tr = Math.max(data[i].high-data[i].low, Math.abs(data[i].high-data[i-1].close), Math.abs(data[i].low-data[i-1].close));
    trs.push(tr);
  }
  const atrVals = wilderMA(trs, period);
  const r = [];
  for (let i = period-1; i < trs.length; i++) {
    if (atrVals[i]!=null) r.push({ time: data[i+1].time, value: atrVals[i] });
  }
  return r;
}

function calcADX(data, period) {
  const pdm=[], ndm=[], trs=[];
  for (let i = 1; i < data.length; i++) {
    const upMove = data[i].high - data[i-1].high;
    const dnMove = data[i-1].low - data[i].low;
    pdm.push(upMove>dnMove&&upMove>0 ? upMove : 0);
    ndm.push(dnMove>upMove&&dnMove>0 ? dnMove : 0);
    trs.push(Math.max(data[i].high-data[i].low, Math.abs(data[i].high-data[i-1].close), Math.abs(data[i].low-data[i-1].close)));
  }
  const spdm = wilderMA(pdm, period);
  const sndm = wilderMA(ndm, period);
  const satr = wilderMA(trs, period);
  const dx=[];
  for (let i = period-1; i < pdm.length; i++) {
    if (satr[i]===0) { dx.push(0); continue; }
    const pdi = 100*spdm[i]/satr[i];
    const ndi = 100*sndm[i]/satr[i];
    dx.push(pdi+ndi===0 ? 0 : 100*Math.abs(pdi-ndi)/(pdi+ndi));
  }
  const adxVals = wilderMA(dx, period);
  const r = [];
  for (let i = period-1; i < dx.length; i++) {
    if (adxVals[i]!=null) r.push({ time: data[i+period].time, value: adxVals[i] });
  }
  return r;
}

function calcCCI(data, period) {
  const r=[];
  for (let i = period-1; i < data.length; i++) {
    const slice = data.slice(i-period+1, i+1);
    const tp = slice.map(d => (d.high+d.low+d.close)/3);
    const mean = tp.reduce((a,b)=>a+b,0)/period;
    const md = tp.reduce((a,b)=>a+Math.abs(b-mean),0)/period;
    r.push({ time: data[i].time, value: md===0 ? 0 : (tp[tp.length-1]-mean)/(0.015*md) });
  }
  return r;
}

function calcOBV(data) {
  const r=[];
  let obv=0;
  r.push({ time: data[0].time, value: 0 });
  for (let i = 1; i < data.length; i++) {
    if (data[i].close > data[i-1].close) obv += data[i].volume;
    else if (data[i].close < data[i-1].close) obv -= data[i].volume;
    r.push({ time: data[i].time, value: obv });
  }
  return r;
}

function calcWillR(data, period) {
  const r=[];
  for (let i = period-1; i < data.length; i++) {
    let hi=-Infinity, lo=Infinity;
    for (let j = i-period+1; j <= i; j++) {
      if (data[j].high>hi) hi=data[j].high;
      if (data[j].low<lo) lo=data[j].low;
    }
    r.push({ time: data[i].time, value: hi===lo ? -50 : -100*(hi-data[i].close)/(hi-lo) });
  }
  return r;
}

function calcMFI(data, period) {
  const r=[];
  const tp = data.map(d => (d.high+d.low+d.close)/3);
  const mf = data.map((d,i) => tp[i]*d.volume);
  for (let i = period; i < data.length; i++) {
    let pmf=0, nmf=0;
    for (let j = i-period+1; j <= i; j++) {
      if (tp[j]>tp[j-1]) pmf+=mf[j];
      else nmf+=mf[j];
    }
    r.push({ time: data[i].time, value: nmf===0 ? 100 : 100-100/(1+pmf/nmf) });
  }
  return r;
}

function calcROC(data, period) {
  const r=[];
  for (let i = period; i < data.length; i++) {
    const prev = data[i-period].close;
    r.push({ time: data[i].time, value: prev===0 ? 0 : 100*(data[i].close-prev)/prev });
  }
  return r;
}

// ── NEW v2 CALCULATIONS ──

function calcSupertrend(data, period=10, mult=3) {
  if (data.length < period+1) return { up:[], dn:[] };
  const atrRaw = [];
  for (let i=1; i<data.length; i++) {
    atrRaw.push(Math.max(data[i].high-data[i].low, Math.abs(data[i].high-data[i-1].close), Math.abs(data[i].low-data[i-1].close)));
  }
  const atr = wilderMA(atrRaw, period);
  const up=[], dn=[];
  let trend = 1; // 1=up, -1=dn
  let stUp = 0, stDn = 0;
  for (let i=period; i<data.length; i++) {
    const atrVal = atr[i-1];
    if (atrVal==null) continue;
    const hl2 = (data[i].high+data[i].low)/2;
    const basicUp = hl2 - mult*atrVal;
    const basicDn = hl2 + mult*atrVal;
    if (i===period) { stUp=basicUp; stDn=basicDn; }
    else {
      stUp = basicUp > stUp || data[i-1].close < stUp ? basicUp : stUp;
      stDn = basicDn < stDn || data[i-1].close > stDn ? basicDn : stDn;
    }
    if (trend===1 && data[i].close < stUp) trend=-1;
    else if (trend===-1 && data[i].close > stDn) trend=1;
    const t = data[i].time;
    if (trend===1) up.push({ time:t, value:stUp });
    else dn.push({ time:t, value:stDn });
  }
  return { up, dn };
}

function calcKeltner(data, period=20, mult=1.5, atrPeriod=10) {
  const mid = calcEMA(data, period);
  const closes = data.map(d=>d.close);
  const atrRaw=[];
  for (let i=1;i<data.length;i++) {
    atrRaw.push(Math.max(data[i].high-data[i].low, Math.abs(data[i].high-data[i-1].close), Math.abs(data[i].low-data[i-1].close)));
  }
  const atrVals = wilderMA(atrRaw, atrPeriod);
  const upper=[], lower=[];
  const off = period-1;
  for (let i=0; i<mid.length; i++) {
    const ai = off+i; // index into atrVals (atrVals is 1 shorter than data)
    const av = atrVals[ai];
    if (!av) continue;
    upper.push({ time:mid[i].time, value:mid[i].value + mult*av });
    lower.push({ time:mid[i].time, value:mid[i].value - mult*av });
  }
  return { mid, upper, lower };
}

function calcDonchian(data, period=20) {
  const upper=[], mid=[], lower=[];
  for (let i=period-1; i<data.length; i++) {
    let hi=-Infinity, lo=Infinity;
    for (let j=i-period+1; j<=i; j++) {
      if (data[j].high>hi) hi=data[j].high;
      if (data[j].low<lo) lo=data[j].low;
    }
    upper.push({ time:data[i].time, value:hi });
    lower.push({ time:data[i].time, value:lo });
    mid.push({ time:data[i].time, value:(hi+lo)/2 });
  }
  return { upper, mid, lower };
}

// Volume Profile: returns {bins, maxVol} for SVG overlay rendering
function calcVolumeProfile(data, bins=30) {
  if (!data.length) return null;
  const lo = Math.min(...data.map(d=>d.low));
  const hi = Math.max(...data.map(d=>d.high));
  if (hi===lo) return null;
  const binSize = (hi-lo)/bins;
  const profile = new Array(bins).fill(0).map((_,i) => ({
    price: lo + (i+0.5)*binSize,
    priceL: lo + i*binSize,
    priceH: lo + (i+1)*binSize,
    vol: 0, buyVol: 0,
  }));
  for (const d of data) {
    const idx = Math.min(bins-1, Math.floor((d.close-lo)/binSize));
    if (idx>=0 && idx<bins) {
      profile[idx].vol += d.volume;
      if (d.close>=d.open) profile[idx].buyVol += d.volume;
    }
  }
  const maxVol = Math.max(...profile.map(b=>b.vol));
  return { profile, maxVol, lo, hi };
}

function fmt(n, digits=2) {
  if (n===undefined||n===null||isNaN(n)) return '—';
  if (n>=1000) return n.toLocaleString('en-US', { maximumFractionDigits: digits });
  if (n>=1) return n.toFixed(digits);
  if (n>=0.01) return n.toFixed(4);
  return n.toFixed(6);
}

function fmtPct(p) {
  if (p===undefined||p===null||isNaN(p)) return '—';
  return (p>0?'+':'')+p.toFixed(2)+'%';
}

// ============================================================
// DATA FETCHING
// ============================================================
async function fetchWithTimeout(url, ms=15000) {
  const ctrl = new AbortController();
  const tid = setTimeout(() => ctrl.abort(), ms);
  try {
    const resp = await fetch(url, { signal: ctrl.signal });
    clearTimeout(tid);
    return resp;
  } catch(e) {
    clearTimeout(tid);
    if (e.name === 'AbortError') throw new Error('Request timed out — check your connection or try a VPN if Binance is blocked in your region.');
    throw e;
  }
}

async function fetchKlines(symbol, interval, limit=600) {
  const url = `${BINANCE}/klines?symbol=${symbol}&interval=${interval}&limit=${limit}`;
  const resp = await fetchWithTimeout(url, 15000);
  if (!resp.ok) {
    const txt = await resp.text().catch(() => '');
    throw new Error(`Binance API error ${resp.status} — ${txt || 'check symbol name'}`);
  }
  const raw = await resp.json();
  if (!Array.isArray(raw) || raw.length === 0) throw new Error(`No data returned for ${symbol}`);
  return raw.map(k => ({
    time:   Math.floor(k[0]/1000),
    open:   parseFloat(k[1]),
    high:   parseFloat(k[2]),
    low:    parseFloat(k[3]),
    close:  parseFloat(k[4]),
    volume: parseFloat(k[5]),
  }));
}

async function fetchPrice(symbol) {
  try {
    const r = await fetchWithTimeout(`${BINANCE}/ticker/24hr?symbol=${symbol}`, 8000);
    if (!r.ok) return null;
    const d = await r.json();
    const price = parseFloat(d.lastPrice);
    const open  = parseFloat(d.openPrice);
    return {
      price,
      open24h: open,
      chgVal:  price - open,
      change24h: parseFloat(d.priceChangePercent),
    };
  } catch(e) { return null; }
}

// EXCHANGE-ABSTRACTED API FUNCTIONS
// ============================================================
function getExchange() { return EXCHANGES[state.settings.exchange] || EXCHANGES.binance; }

async function fetchKlinesExchange(symbol, tf, limit=600) {
  const ex = getExchange();
  if (ex.id === 'binance') return fetchKlines(symbol, getBinanceInterval(tf), limit);
  if (ex.id === 'bybit') return fetchKlinesBybit(symbol, tf, limit);
  if (ex.id === 'okx') return fetchKlinesOKX(symbol, tf, limit);
  // fallback to binance for unsupported
  toast(`${ex.name}: limited support, using Binance data`);
  return fetchKlines(symbol, getBinanceInterval(tf), limit);
}

async function fetchKlinesBybit(symbol, tf, limit=600) {
  const ex = EXCHANGES.bybit;
  const iv = ex.intervals[tf] || '60';
  const url = `${ex.rest}/kline?category=spot&symbol=${symbol}&interval=${iv}&limit=${Math.min(limit,1000)}`;
  const resp = await fetchWithTimeout(url, 15000);
  if (!resp.ok) throw new Error(`Bybit API error ${resp.status}`);
  const json = await resp.json();
  if (json.retCode !== 0) throw new Error(`Bybit: ${json.retMsg}`);
  // Bybit returns newest first, so reverse
  return json.result.list.reverse().map(k => ({
    time:   Math.floor(parseInt(k[0])/1000),
    open:   parseFloat(k[1]),
    high:   parseFloat(k[2]),
    low:    parseFloat(k[3]),
    close:  parseFloat(k[4]),
    volume: parseFloat(k[5]),
  }));
}

async function fetchKlinesOKX(symbol, tf, limit=300) {
  const ex = EXCHANGES.okx;
  const instId = symbol.replace('USDT','-USDT').replace('BTC-USDT','BTC-USDT');
  const bar = ex.intervals[tf] || '1H';
  const url = `${ex.rest}/candles?instId=${instId}&bar=${bar}&limit=${Math.min(limit,300)}`;
  const resp = await fetchWithTimeout(url, 15000);
  if (!resp.ok) throw new Error(`OKX API error ${resp.status}`);
  const json = await resp.json();
  if (json.code !== '0') throw new Error(`OKX: ${json.msg}`);
  return json.data.reverse().map(k => ({
    time:   Math.floor(parseInt(k[0])/1000),
    open:   parseFloat(k[1]),
    high:   parseFloat(k[2]),
    low:    parseFloat(k[3]),
    close:  parseFloat(k[4]),
    volume: parseFloat(k[5]),
  }));
}

async function fetchPriceExchange(symbol) {
  const ex = getExchange();
  if (ex.id === 'binance') return fetchPrice(symbol);
  if (ex.id === 'bybit') return fetchPriceBybit(symbol);
  return fetchPrice(symbol); // fallback
}

async function fetchPriceBybit(symbol) {
  try {
    const url = `${EXCHANGES.bybit.rest}/tickers?category=spot&symbol=${symbol}`;
    const r = await fetchWithTimeout(url, 8000);
    if (!r.ok) return null;
    const d = await r.json();
    if (d.retCode !== 0) return null;
    const t = d.result?.list?.[0];
    if (!t) return null;
    const price = parseFloat(t.lastPrice);
    const open  = parseFloat(t.prevPrice24h);
    return { price, open24h:open, chgVal:price-open, change24h:parseFloat(t.price24hPcnt)*100 };
  } catch(e) { return null; }
}

async function fetchAllPairsExchange() {
  const ex = getExchange();
  if (ex.id === 'binance') return fetchAllPairsBinance();
  if (ex.id === 'bybit')   return fetchAllPairsBybit();
  return fetchAllPairsBinance(); // fallback
}

async function fetchAllPairsBinance() {
  const url = `${EXCHANGES.binance.rest}/exchangeInfo`;
  const r = await fetchWithTimeout(url, 15000);
  if (!r.ok) throw new Error('Failed to load pairs');
  const d = await r.json();
  return d.symbols
    .filter(s => s.status==='TRADING' && s.quoteAsset==='USDT')
    .map(s => ({ symbol:s.symbol, name:s.baseAsset }));
}

async function fetchAllPairsBybit() {
  const url = `${EXCHANGES.bybit.rest}/instruments-info?category=spot`;
  const r = await fetchWithTimeout(url, 15000);
  if (!r.ok) throw new Error('Failed to load pairs');
  const d = await r.json();
  return (d.result?.list || [])
    .filter(s => s.status==='Trading' && s.quoteCoin==='USDT')
    .map(s => ({ symbol:s.symbol, name:s.baseCoin }));
}

// ============================================================
// PRICE WEBSOCKET (watchlist live prices)
// ============================================================
function startPriceWS() {
  const allSymbols = new Set();
  for (const wl of Object.values(state.watchlists))
    for (const s of wl) allSymbols.add(s.symbol);

  if (state.ws) { state.ws.close(); state.ws = null; }
  if (allSymbols.size === 0) return;

  const ex = getExchange();

  function applyPrice(sym, price, open) {
    state.prices[sym] = { price, open24h:open, chgVal:price-open,
      change24h: open>0 ? ((price-open)/open)*100 : 0 };
    updateSymbolPrice(sym);
    checkAlerts(sym, price);
  }

  if (ex.id === 'binance') {
    const streams = [...allSymbols].map(s => `${s.toLowerCase()}@miniTicker`).join('/');
    const ws = new WebSocket(`wss://stream.binance.com:9443/stream?streams=${streams}`);
    ws.onmessage = e => {
      try { const msg=JSON.parse(e.data); if(!msg.data) return;
        const d=msg.data; applyPrice(d.s, parseFloat(d.c), parseFloat(d.o));
      } catch(err){}
    };
    ws.onerror=()=>{}; ws.onclose=()=>{};
    state.ws = ws;
  } else if (ex.id === 'bybit') {
    const ws = new WebSocket('wss://stream.bybit.com/v5/public/spot');
    const syms = [...allSymbols];
    ws.onopen = () => ws.send(JSON.stringify({op:'subscribe',args:syms.map(s=>`tickers.${s}`)}));
    ws.onmessage = e => {
      try { const msg=JSON.parse(e.data); const d=msg.data; if(!d||!d.symbol) return;
        applyPrice(d.symbol, parseFloat(d.lastPrice), parseFloat(d.prevPrice24h));
      } catch(err){}
    };
    ws.onerror=()=>{}; ws.onclose=()=>{};
    state.ws = ws;
  } else {
    // Poll for unsupported exchanges
    const poll = async () => {
      for (const sym of allSymbols) {
        const p = await fetchPriceExchange(sym).catch(()=>null);
        if (p) applyPrice(sym, p.price, p.open24h);
      }
    };
    poll();
    const t = setInterval(poll, 15000);
    state.ws = { close: () => clearInterval(t) };
  }
}

function updateSymbolPrice(sym) {
  const p = state.prices[sym];
  if (!p) return;
  const up = p.change24h >= 0;
  document.querySelectorAll(`.sym-item[data-sym="${sym}"]`).forEach(el => {
    const priceEl  = el.querySelector('.sym-cell-price');
    const chgValEl = el.querySelector('.sym-cell-chgval');
    const chgPctEl = el.querySelector('.sym-cell-chgpct');
    if (priceEl)  priceEl.textContent = fmt(p.price);
    if (chgValEl) { chgValEl.textContent = (up?'+':'')+fmt(p.chgVal); chgValEl.className='sym-cell-chgval '+(up?'up':'dn'); }
    if (chgPctEl) { chgPctEl.textContent = fmtPct(p.change24h);        chgPctEl.className='sym-cell-chgpct '+(up?'up':'dn'); }
  });
}

  // Use explicit fallback dimensions if container hasn't been laid out yet
  const w = Math.max(container.clientWidth, 300);
  const h = Math.max(container.clientHeight, 200);
  const chart = LightweightCharts.createChart(container, {
    ...getChartOptions(state.theme),
    width: w,
    height: h,
  });

  const candleSeries = chart.addCandlestickSeries({
    upColor: '#26a69a', downColor: '#ef5350',
    borderVisible: false,
    wickUpColor: '#26a69a', wickDownColor: '#ef5350',
  });

  // Volume histogram (on separate price scale)
  const volSeries = chart.addHistogramSeries({
    color: '#26a69a44',
    priceFormat: { type:'volume' },
    priceScaleId: 'vol',
  });
  chart.priceScale('vol').applyOptions({
    scaleMargins: { top: 0.8, bottom: 0 },
    visible: false,
  });

  // Crosshair data update
  chart.subscribeCrosshairMove(param => {
    if (!param.time) return;
    const bar = param.seriesData.get(candleSeries);
    if (!bar) return;
    panel.el.querySelector(`#${panel.id}_o`).textContent = fmt(bar.open);
    panel.el.querySelector(`#${panel.id}_h`).textContent = fmt(bar.high);
    panel.el.querySelector(`#${panel.id}_l`).textContent = fmt(bar.low);
    panel.el.querySelector(`#${panel.id}_c`).textContent = fmt(bar.close);
  });

  panel.chart = chart;
  panel.candleSeries = candleSeries;
  panel.volSeries = volSeries;

  // Resize observer
  const ro = new ResizeObserver(() => {
    const w = container.clientWidth;
    const h = container.clientHeight;
    if (w>0&&h>0) chart.resize(w, h);
  });
  ro.observe(container);
  panel.resizeObs = ro;

  // Time range sync with sub-charts + redraw drawings
  chart.timeScale().subscribeVisibleLogicalRangeChange(range => {
    if (!range || panel.syncing) return;
    panel.syncing = true;
    panel.subCharts.forEach(sc => {
      try { sc.chart.timeScale().setVisibleLogicalRange(range); } catch(e){}
    });
    panel.syncing = false;
    requestAnimationFrame(() => renderDrawings(panel));
  });

  // Redraw drawings on crosshair move (handles vertical scale changes)
  chart.subscribeCrosshairMove(() => {
    renderDrawings(panel);
  });

  // Attach drawing overlay
  addDrawingOverlay(panel);

  // Mouse-wheel scrolling:
  //  • Hovering over the panel bar (header) → scroll the charts area
  //  • Shift+wheel anywhere on the chart body → scroll the charts area
  //  • Plain wheel on chart canvas → LightweightCharts zoom (default)
  requestAnimationFrame(() => {
    const panelBar = panel.el.querySelector('.panel-bar');
    if (panelBar) {
      panelBar.addEventListener('wheel', e => {
        document.getElementById('chartsArea').scrollBy({ top: e.deltaY, left: e.deltaX });
      }, { passive: true });
    }
    const chartBody = panel.el.querySelector('.chart-body');
    if (chartBody) {
      chartBody.addEventListener('wheel', e => {
        if (e.shiftKey) {
          e.stopPropagation();
          document.getElementById('chartsArea').scrollBy({ top: e.deltaY, left: e.deltaX });
        }
      }, { passive: true });
    }
  });
}

async function loadPanelData(panel) {
  const loading = panel.el.querySelector(`#${panel.id}_loading`);
  loading.style.display = 'flex';
  loading.innerHTML = `<div class="spinner"></div> Loading ${panel.symbol}...`;

  try {
    // Ensure chart is initialised (may not be if DOM wasn't ready)
    if (!panel.chart) initChart(panel);

    const data = await fetchKlinesExchange(panel.symbol, panel.timeframe);
    panel.data = data;
    panel.candleSeries.setData(data);
    panel.volSeries.setData(data.map(d => ({
      time: d.time, value: d.volume,
      color: d.close >= d.open ? '#26a69a44' : '#ef535044',
    })));
    panel.chart.timeScale().fitContent();

    // Update watermark
    const wm = panel.el.querySelector('.watermark');
    if (wm) wm.textContent = panel.symbol.replace('USDT','');

    // Update OHLCV with last bar
    const last = data[data.length-1];
    updateOHLCV(panel, last);

    // Recompute indicators
    panel.indicators.forEach(ind => updateIndicatorSeries(panel, ind));

    // Start kline WS
    startKlineWS(panel);

    loading.style.display = 'none';
  } catch(e) {
    console.error('[CryptoPro] loadPanelData error:', e);
    loading.style.display = 'flex';
    loading.innerHTML = `
      <div style="text-align:center;max-width:280px">
        <div style="color:var(--red);font-weight:600;margin-bottom:6px">⚠ ${e.message || 'Failed to load data'}</div>
        <button onclick="loadPanelData(state.panels.find(p=>p.id==='${panel.id}'))"
          style="margin-top:8px;padding:5px 12px;border-radius:4px;border:1px solid var(--border);
                 background:var(--bg-tertiary);color:var(--text-primary);cursor:pointer;font-size:12px">
          Retry
        </button>
      </div>`;
  }
}

function updateOHLCV(panel, bar) {
  if (!bar) return;
  const firstClose = panel.data.length>0 ? panel.data[0].close : bar.close;
  const pct = ((bar.close-firstClose)/firstClose)*100;
  panel.el.querySelector(`#${panel.id}_o`).textContent = fmt(bar.open);
  panel.el.querySelector(`#${panel.id}_h`).textContent = fmt(bar.high);
  panel.el.querySelector(`#${panel.id}_l`).textContent = fmt(bar.low);
  panel.el.querySelector(`#${panel.id}_c`).textContent = fmt(bar.close);
  const pctEl = panel.el.querySelector(`#${panel.id}_pct`);
  if (pctEl) {
    pctEl.textContent = fmtPct(pct);
    pctEl.className = pct>=0?'pct-up':'pct-dn';
  }
}

function startKlineWS(panel) {
  if (panel.klineWS) { panel.klineWS.close(); panel.klineWS = null; }
  const ex = getExchange();
  let ws;

  function applyBar(bar) {
    if (!bar || panel.data.length === 0) return;
    const uc = state.settings.upColor || '#26a69a';
    const dc = state.settings.downColor || '#ef5350';
    if (panel.data[panel.data.length-1].time === bar.time) {
      panel.data[panel.data.length-1] = bar;
    } else if (bar.time > panel.data[panel.data.length-1].time) {
      panel.data.push(bar);
    } else { return; }
    panel.candleSeries.update(bar);
    panel.volSeries.update({ time:bar.time, value:bar.volume,
      color: bar.close >= bar.open ? uc+'44' : dc+'44' });
    updateOHLCV(panel, bar);
    // Check alerts
    checkAlerts(panel.symbol, bar.close);
  }

  if (ex.id === 'binance') {
    const iv = getBinanceInterval(panel.timeframe);
    ws = new WebSocket(`wss://stream.binance.com:9443/ws/${panel.symbol.toLowerCase()}@kline_${iv}`);
    ws.onmessage = e => {
      try { const msg=JSON.parse(e.data); const k=msg.k; if(!k) return;
        applyBar({time:Math.floor(k.t/1000),open:parseFloat(k.o),high:parseFloat(k.h),low:parseFloat(k.l),close:parseFloat(k.c),volume:parseFloat(k.v)});
      } catch(err){}
    };
  } else if (ex.id === 'bybit') {
    const iv = ex.intervals[panel.timeframe] || '60';
    ws = new WebSocket('wss://stream.bybit.com/v5/public/spot');
    ws.onopen = () => ws.send(JSON.stringify({op:'subscribe',args:[`kline.${iv}.${panel.symbol}`]}));
    ws.onmessage = e => {
      try {
        const msg = JSON.parse(e.data);
        const k = msg.data?.[0]; if(!k) return;
        applyBar({time:Math.floor(parseInt(k.start)/1000),open:parseFloat(k.open),high:parseFloat(k.high),low:parseFloat(k.low),close:parseFloat(k.close),volume:parseFloat(k.volume)});
      } catch(err){}
    };
  } else {
    // For unsupported exchanges, poll every 10s
    const poll = () => fetchKlinesExchange(panel.symbol, panel.timeframe, 2).then(d => { if(d.length) applyBar(d[d.length-1]); }).catch(()=>{});
    const timer = setInterval(poll, 10000);
    panel.klineWS = { close: () => clearInterval(timer) };
    return;
  }

  ws.onerror = () => {};
  ws.onclose = () => {};
  panel.klineWS = ws;
}

function changeSymbol(panel, symbol, symbolName) {
  panel.symbol = symbol;
  panel.symbolName = symbolName;
  panel.el.querySelector('.sym-name').textContent = symbol;
  // Remove all indicators and sub-charts, reload
  [...panel.indicators].forEach(ind => removeIndicator(panel, ind.uid));
  loadPanelData(panel);
  // Mark active in watchlist
  renderSymbolList();
  autoSave();
}

function setActivePanel(panel) {
  state.activePanel = panel;
  document.querySelectorAll('.chart-panel').forEach(el => el.classList.remove('is-active'));
  panel.el.classList.add('is-active');
  // Sync global timeframe buttons
  document.querySelectorAll('#globalTfBtns .tf-btn').forEach(btn => {

  });
  // Update right panel
  if (state.rightTab === 'orderbook') startOrderBook(panel.symbol);
  if (state.rightTab === 'techinfo')  updateTechInfo(panel.symbol, panel.symbolName);
  // Highlight active symbol in watchlist
  document.querySelectorAll('.sym-item').forEach(el => el.classList.toggle('active', el.dataset.sym === panel.symbol));
}
